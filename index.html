  '甲':['东北','东北','东南'],'乙':['西北','东北','东南'],'丙':['西南','正西','正东'],
  '丁':['正南','西南','正东'],'戊':['东南','正北','东北'],'己':['东北','正南','正南'],
  '庚':['西北','正东','西南'],'辛':['西南','正东','西南'],'壬':['正南','正南','西北'],
  '癸':['东南','正南','正西']
};

function fetchHuangli(dateStr, silent) {
  if (HL_CACHE[dateStr]) return Promise.resolve(HL_CACHE[dateStr]);
  if (HL_LOADING[dateStr]) return HL_LOADING[dateStr];
  const cacheKey = 'hl_'+dateStr;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) { HL_CACHE[dateStr] = JSON.parse(cached); return Promise.resolve(HL_CACHE[dateStr]); }
  } catch(e) {}
  const loading = document.getElementById('hlLoading');
  if (!silent && loading) loading.style.display = 'flex';
  var ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var timer = ctrl ? setTimeout(function() { ctrl.abort(); }, 5000) : setTimeout(function() {}, 5000);
  var fetchOpts = ctrl ? { signal: ctrl.signal } : {};
  const p = fetch(HL_API + encodeURIComponent(dateStr), fetchOpts)
    .then(r => r.json())
    .then(res => {
      clearTimeout(timer);
      if (!silent && loading) loading.style.display = 'none';
      delete HL_LOADING[dateStr];
      if (res.code === 0 && res.data) {
        HL_CACHE[dateStr] = res.data;
        try { localStorage.setItem(cacheKey, JSON.stringify(res.data)); } catch(e) {}
        return res.data;
      }
      return null;
    })
    .catch(() => { clearTimeout(timer); if (!silent && loading) loading.style.display = 'none'; delete HL_LOADING[dateStr]; return null; });
  HL_LOADING[dateStr] = p;
  return p;
}

/* 静默预加载前后 N 天的黄历数据 */
function prefetchAdjacent(dateStr, n) {
  n = n || 1;
  const d = parseDate(dateStr);
  for (let i = -n; i <= n; i++) {
    if (i === 0) continue;
    const nd = new Date(d); nd.setDate(d.getDate() + i);
    fetchHuangli(fmtDate(nd), true);
  }
}

function renderHuangli(dateStr) {
  const panel = document.getElementById('huangliPanel');
  if (!panel) return;
  fetchHuangli(dateStr).then(data => {
    if (!data) { panel.style.opacity = '0.5'; return; }
    panel.style.opacity = '1';
    /* 后台预加载前后 1 天的黄历 */
    try { prefetchAdjacent(dateStr, 1); } catch(e) {}
    const s = data.solar, l = data.lunar, a = data.almanac;

    /* 公历 */
    document.getElementById('hlYear').textContent = s.year;
    document.getElementById('hlMonth').textContent = s.month;
    document.getElementById('hlDay').textContent = s.day;
    document.getElementById('hlWeek').textContent = s.weekday;

    /* 农历 */
    const leapTag = l.is_leap_month ? '闰' : '';
    const monthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
    const dayNames = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
      '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
      '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
    const lunarStr = leapTag + monthNames[l.month - 1] + '月' + (dayNames[l.day] || l.day_cn || String(l.day));
    document.getElementById('hlLunar').textContent = lunarStr;
    document.getElementById('hlShengxiao').textContent = l.zodiac + '年';

    /* 节气 */
    const jieqiEl = document.getElementById('hlJieqi');
    if (a.jieqi) {
      jieqiEl.textContent = a.jieqi; jieqiEl.style.display = '';
    } else { jieqiEl.style.display = 'none'; }

    /* 干支 */
    document.getElementById('hlYearGz').textContent = l.year_ganzhi;
    document.getElementById('hlMonthGz').textContent = l.month_ganzhi;
    document.getElementById('hlDayGz').textContent = l.day_ganzhi;
    document.getElementById('hlWx').textContent = a.wuxing || '--';

    /* meta */
    document.getElementById('hlChong').textContent = a.chongsha || '--';
    document.getElementById('hlStar').textContent = a.star || '--';
    document.getElementById('hlTaishen').textContent = a.taishen || '--';
    document.getElementById('hlPengzu').textContent = a.pengzu || '--';

    /* 宜忌 */
    const yiStr = (a.yi && a.yi.length) ? a.yi.join(' · ') : '诸事不宜';
    const jiStr = (a.ji && a.ji.length) ? a.ji.join(' · ') : '诸事皆宜';
    document.getElementById('hlYi').textContent = yiStr;
    document.getElementById('hlJi').textContent = jiStr;

    /* 时辰吉凶 */
    const scGrid = document.getElementById('hlShichen');
    if (a.shichen && a.shichen.length) {
      scGrid.innerHTML = a.shichen.slice(0, 12).map(h => {
        let cls = 'sc-ji';
        if (h.type === '大吉' || h.type === '上吉') cls = 'sc-da-ji';
        else if (h.type === '小吉' || h.type === '吉') cls = 'sc-xiao-ji';
        return `<span class="hl-shichen-item ${cls}" title="${h.type}·${h.xingshen}">${h.name}</span>`;
      }).join('');
    }
  });
}

function hashCode(s) {let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}
function getDailyQuote() {
  const key = 'daily-quote-' + currentDate;
  try {
    let cached = localStorage.getItem(key); if (cached) return cached;
    const idx = Math.abs(hashCode(currentDate)) % zengQuotes.length;
    const quote = zengQuotes[idx];
    try { localStorage.setItem(key, quote); } catch(e) {}
    return quote;
  } catch(e) {
    const idx = Math.abs(hashCode(currentDate)) % zengQuotes.length;
    return zengQuotes[idx];
  }
}
function showDailyQuote() {
  const el = document.getElementById('dailyQuote');
  if (el) el.textContent = '「' + getDailyQuote() + '」—— 曾仕强';
}
function setMood(val) {
  currentMood = val;
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('mood-active', parseInt(b.dataset.mood) === val);
  });
  // 即时保存心情
  const entries = loadEntries();
  const entry = entries[currentDate] || { content: '', duration: 0 };
  entry.mood = val;
  entries[currentDate] = entry;
  saveEntries(entries);
  if (typeof calYear !== 'undefined') renderCalendar(calYear, calMonth);
}

// ====== 心情曲线 ======
function drawMoodChart() {
  if (!statsCtx) return;
  const entries = loadEntries();
  const refDate = parseDate(currentDate);
  const y = refDate.getFullYear(), m = refDate.getMonth();
  const dim = new Date(y, m+1, 0).getDate();
  const moodMap = {5:'😊',4:'🤩',3:'😐',2:'😢',1:'😡'};
  const data = [];
  for (let d = 1; d <= dim; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = entries[ds];
    data.push(entry && entry.mood ? entry.mood : null);
  }

  const W = statsCanvas.width, H = statsCanvas.height;
  const pad = { top: 40, right: 40, bottom: 50, left: 50 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  statsCtx.clearRect(0, 0, W, H);

  // 标题
  statsCtx.fillStyle = '#880e4f'; statsCtx.font = 'bold 14px -apple-system, sans-serif';
  statsCtx.textAlign = 'center'; statsCtx.fillText('本月心情曲线', W/2, 20);

  // Y轴标签
  const moodLabels = ['😡','😢','😐','🤩','😊'];
  for (let i = 0; i < 5; i++) {
    const yy = pad.top + chartH * (1 - i / 4);
    statsCtx.fillStyle = '#f48fb1'; statsCtx.font = '16px -apple-system, sans-serif';
    statsCtx.textAlign = 'right';
    statsCtx.fillText(moodLabels[i], pad.left - 8, yy + 5);
  }

  // 网格线
  statsCtx.strokeStyle = '#fce4ec'; statsCtx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const yy = pad.top + chartH * (1 - i / 4);
    statsCtx.beginPath(); statsCtx.moveTo(pad.left, yy); statsCtx.lineTo(W - pad.right, yy); statsCtx.stroke();
  }

  // 画折线
  const validPoints = [];
  data.forEach((v, i) => {
    if (v !== null) {
      const x = pad.left + (i / (dim - 1)) * chartW;
      const yy = pad.top + chartH * (1 - (v - 1) / 4);
      validPoints.push({x, yy, v, day: i + 1});
    }
  });

  if (validPoints.length === 0) {
    statsCtx.fillStyle = '#f48fb1'; statsCtx.font = '14px -apple-system, sans-serif';
    statsCtx.textAlign = 'center'; statsCtx.fillText('本月暂无心情记录', W/2, H/2);
    return;
  }

  // 连线
  statsCtx.strokeStyle = '#e91e63'; statsCtx.lineWidth = 2;
  statsCtx.beginPath();
  validPoints.forEach((p, i) => {
    if (i === 0) statsCtx.moveTo(p.x, p.yy);
    else statsCtx.lineTo(p.x, p.yy);
  });
  statsCtx.stroke();

  // 数据点
  validPoints.forEach(p => {
    statsCtx.fillStyle = '#fff';
    statsCtx.beginPath(); statsCtx.arc(p.x, p.yy, 5, 0, Math.PI*2); statsCtx.fill();
    statsCtx.fillStyle = '#e91e63';
    statsCtx.beginPath(); statsCtx.arc(p.x, p.yy, 3, 0, Math.PI*2); statsCtx.fill();
  });

  // X轴日期标签（覆盖所有日期，不依赖心情数据点）
  statsCtx.fillStyle = '#6d4c5e'; statsCtx.font = '10px -apple-system, sans-serif';
  statsCtx.textAlign = 'center';
  for (let i = 1; i <= dim; i++) {
    if (i === 1 || i % 5 === 0 || i === dim) {
      const x = pad.left + ((i - 1) / (dim - 1)) * chartW;
      statsCtx.fillText(i, x, pad.top + chartH + 14);
    }
  }
}

// ====== 月视图摘要 ======
function renderMonthSummary(year, month, entries) {
  const summary = document.getElementById('monthSummary');
  if (!summary) return;
  // 仅当选中日期在当前渲染月份内时才展示摘要
  const [cy, cm] = currentDate.split('-').map(Number);
  if (cy !== year || cm !== month + 1) {
    summary.innerHTML = '';
    return;
  }
  const today = getToday();
  const entry = entries[currentDate];
  const hasLedger = getDayTransactions(currentDate).length > 0;
  if (!entry || (!entry.content && (!entry.templateContents || !Object.keys(entry.templateContents).length) && !hasLedger)) {
    summary.innerHTML = '<div style="font-size:11px;color:var(--c-light);padding:4px 8px;">本日暂无计划</div>';
    return;
  }
  const parts = [];
  if (entry.templateContents && Object.keys(entry.templateContents).length) {
    parts.push(Object.keys(entry.templateContents).map(t => t + ' ✅').join('<br>'));
  } else if (entry.content) {
    const firstLine = entry.content.trim().split('\n')[0].replace(/^#+\s*/, '').substring(0, 15);
    parts.push(firstLine || '(空)');
  }
  if (hasLedger) parts.push('记账 ✅');
  const preview = parts.join('<br>');
  summary.innerHTML = `<div class="ms-item" onclick="setDate('${currentDate}')"><span class="ms-preview">${preview}</span></div>`;
}

  { id:'transport', name:'交通', icon:'🚇' },
  { id:'shopping', name:'购物', icon:'🛒' },
  { id:'entertainment', name:'娱乐', icon:'🎮' },
  { id:'housing', name:'住房', icon:'🏠' },
  { id:'comm', name:'通讯', icon:'📱' },
  { id:'medical', name:'医疗', icon:'💊' },
  { id:'education', name:'教育', icon:'📚' },
  { id:'other', name:'其他', icon:'📌' }
];

const INCOME_CATS = [
  { id:'salary', name:'工资', icon:'💰' },
  { id:'parttime', name:'兼职', icon:'💼' },
  { id:'invest', name:'理财', icon:'📈' },
  { id:'gift', name:'红包', icon:'🧧' },

];

function getCatName(catId) {
  const found = EXPENSE_CATS.concat(INCOME_CATS).find(c => c.id === catId);
  return found ? found.name : catId;
}

function getLedgerData() {
  try { return JSON.parse(localStorage.getItem(LEDGER_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveLedgerData(data) { try { localStorage.setItem(LEDGER_KEY, JSON.stringify(data)); } catch(e) {} backupDayData(); }

function getDayTransactions(dateStr) {
  return getLedgerData().filter(t => t.date === dateStr);
}

function addLedgerEntry() {
  const type = document.getElementById('lType').value;
  const amount = parseFloat(document.getElementById('lAmount').value);
  const category = document.getElementById('lCategory').value;
  const note = document.getElementById('lNote').value.trim();
  if (isNaN(amount) || amount <= 0) { showToast('请输入有效金额'); return; }
  const data = getLedgerData();
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  data.push({ id: Date.now() + Math.random(), date: currentDate, type, amount, category, note, time: timeStr });

  document.getElementById('lNote').value = '';
  renderLedger();

function deleteLedgerEntry(id) {
  const data = getLedgerData();
  const idx = data.findIndex(t => t.id === id);
  if (idx >= 0) { data.splice(idx, 1); saveLedgerData(data); renderLedger(); const d = parseDate(currentDate); renderCalendar(d.getFullYear(), d.getMonth()); }
}

function switchLedgerType() {
  const type = document.getElementById('lType');
  const sel = document.getElementById('lCategory');
  if (!type || !sel) return;
  const cats = type.value === 'income' ? INCOME_CATS : EXPENSE_CATS;
  sel.innerHTML = cats.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function renderLedger() {
  const txns = getDayTransactions(currentDate);
  const el = document.getElementById('ledgerList');
  document.getElementById('lsDate').textContent = currentDate;

  let incomeTotal = 0, expenseTotal = 0;
  txns.forEach(t => {
    const amt = Number(t.amount) || 0;
    if (t.type === 'income') incomeTotal += amt;
    else expenseTotal += amt;
  });

  document.getElementById('lsIncome').textContent = `收入 ¥${incomeTotal.toFixed(2)}`;
  document.getElementById('lsExpense').textContent = `支出 ¥${expenseTotal.toFixed(2)}`;
  document.getElementById('lTotalBottom').textContent =
    `收入 ¥${incomeTotal.toFixed(2)} · 支出 ¥${expenseTotal.toFixed(2)} · 结余 ¥${(incomeTotal - expenseTotal).toFixed(2)}`;

  // ── 今日金额条 ──
  const totalAmount = incomeTotal + expenseTotal;
  const dayBar = document.getElementById('dayAmountBar');
  if (totalAmount > 0) {
    const inPct = Math.round(incomeTotal / totalAmount * 100);
    const exPct = 100 - inPct;
    dayBar.innerHTML =
      (incomeTotal > 0 ? `<span class="ldb-income" style="flex:${inPct}">收 ¥${incomeTotal.toFixed(0)}</span>` : '') +
      (expenseTotal > 0 ? `<span class="ldb-expense" style="flex:${exPct}">支 ¥${expenseTotal.toFixed(0)}</span>` : '');
    if (incomeTotal === 0 && expenseTotal > 0) dayBar.innerHTML = `<span class="ldb-expense" style="flex:1">支 ¥${expenseTotal.toFixed(0)}</span>`;
    if (expenseTotal === 0 && incomeTotal > 0) dayBar.innerHTML = `<span class="ldb-income" style="flex:1">收 ¥${incomeTotal.toFixed(0)}</span>`;
  } else {
    dayBar.innerHTML = '<span class="ldb-none">暂无记账</span>';
  }

  // ── 当日支出分类排行 ──
  const catBreakdown = document.getElementById('catBreakdown');
  if (expenseTotal > 0) {
    const catMap = {};
    txns.filter(t => t.type === 'expense').forEach(t => {
      catMap[t.category] = (catMap[t.category] || 0) + t.amount;
    });
    const sorted = Object.entries(catMap).sort((a,b) => b[1] - a[1]);
    catBreakdown.innerHTML = sorted.map(([catId, amt]) => {
      const pct = Math.round(amt / expenseTotal * 100);
      return `<span class="lcb-tag">${getCatName(catId)} ¥${amt.toFixed(0)} ${pct}%</span>`;
    }).join('');
    catBreakdown.style.display = '';
  } else {
    catBreakdown.innerHTML = '';
    catBreakdown.style.display = 'none';
  }

  // ── 月度预算提醒 ──
  const budget = parseFloat(localStorage.getItem('ledger_monthly_budget') || '0');
  const budgetAlert = document.getElementById('lBudgetAlert');
  if (budget > 0) {
    const monthTxns = getMonthTransactions();
    let mExpense = 0;
    monthTxns.forEach(t => { if (t.type === 'expense') mExpense += t.amount; });
    const used = Math.round(mExpense / budget * 100);
    const left = budget - mExpense;
    const warnClass = used >= 90 ? 'color:#e53935;font-weight:700;' : used >= 70 ? 'color:#ff9800;font-weight:600;' : 'color:#4caf50;';
    budgetAlert.style.display = '';
    budgetAlert.style.cssText = `font-size:11px;${warnClass}`;
    budgetAlert.textContent = `本月预算 ¥${budget.toFixed(0)} · 已用 ${used}% · 剩余 ¥${left.toFixed(0)}`;
  } else {
    budgetAlert.style.display = 'none';
  }

  updateMonthlyStats();
  drawLedgerMiniChart();

  if (txns.length === 0) {
    el.innerHTML = '<div class="ledger-empty">暂无记录</div>';
    return;
  }

  const allCats = [...EXPENSE_CATS, ...INCOME_CATS];
  function catInfo(catId) { return allCats.find(c => c.id === catId) || { name: catId, icon: '📌' }; }

  el.innerHTML = txns.map(t => {
    const c = catInfo(t.category);
    const amtClass = t.type === 'income' ? 'income' : 'expense';
    const sign = t.type === 'income' ? '+' : '-';
    return `<div class="l-item" data-id="${t.id}" onclick="editLedgerEntry(${t.id})">
      ${t.time ? `<span class="l-time">${t.time}</span>` : ''}
      <span class="l-cat-icon ${t.type}">${c.icon}</span>
      <div class="l-info">
        <div class="l-cat-name">${c.name}</div>
        ${t.note ? `<div class="l-note">${escHtml(t.note)}</div>` : ''}
      </div>
      <span class="l-amount ${amtClass}">${sign}¥${t.amount.toFixed(2)}</span>
      <button class="l-del" onclick="event.stopPropagation();deleteLedgerEntry(${t.id})" title="删除">×</button>
    </div>`;
  }).join('');
}

    return `${y}-${String(m).padStart(2,'0')}`;

function drawLedgerMiniChart() {
  const wrap = document.getElementById('ledgerMiniChartWrap');
  const days = getWeekDays();
  const txns = getLedgerData();
  const data = days.map(d => {
    return txns.filter(t => t.date === d && t.type === 'expense').reduce((s, t) => s + (Number(t.amount) || 0), 0);
  });
  const total = data.reduce((a,b) => a+b, 0);
  if (total === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const canvas = document.getElementById('ledgerMiniCanvas');
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const pad = { top: 16, right: 16, bottom: 20, left: 32 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  const maxVal = (() => { const v = Math.max(1, ...data); return isNaN(v) ? 1 : v; })();

  // Y轴刻度
  ctx.fillStyle = '#999'; ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= 2; i++) {
    const v = Math.round(maxVal * i / 2);
    const y = pad.top + ch * (1 - i / 2);
    ctx.fillText('¥'+v, pad.left - 4, y + 3);
  }

  // 折线
  ctx.strokeStyle = '#e53935'; ctx.lineWidth = 2; ctx.beginPath();
  const gap = cw / (data.length - 1 || 1);
  const pts = data.map((v,i) => ({ x: pad.left + gap * i, y: pad.top + ch - (v / maxVal) * ch }));
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();

  // 点
  pts.forEach(p => { ctx.fillStyle = '#e53935'; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });

  // 日期标签
  ctx.fillStyle = '#999'; ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'center';
  const dayLabels = days.map(d => d.split('-')[2]);
  dayLabels.forEach((l, i) => ctx.fillText(l, pts[i].x, H - 4));
}

const CAT_COLORS = [
  '#e53935', '#ff9800', '#9c27b0', '#2196f3', '#795548',
  '#607d8b', '#e91e63', '#4caf50', '#9e9e9e'
];

function drawLedgerTrend() {
  const canvas = document.getElementById('statsCanvas');
  if (!canvas) return;
  canvas.style.display = '';
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;
  ctx.clearRect(0, 0, W, H);

  const months = getMonthDays();
  const txns = getLedgerData();
  const monthVal = months[0].slice(0, 7);
  const monthTxns = txns.filter(t => t.date.startsWith(monthVal));

  // 按日按分类聚合
  const cats = EXPENSE_CATS.map(c => c.id);
  const dailyMap = {};
  months.forEach(d => {
    dailyMap[d] = {};
    cats.forEach(c => dailyMap[d][c] = 0);
  });
  monthTxns.filter(t => t.type === 'expense').forEach(t => {
    if (dailyMap[t.date] && dailyMap[t.date][t.category] !== undefined) {
      dailyMap[t.date][t.category] += (Number(t.amount) || 0);
    }
  });

  const dailyTotals = months.map(d => cats.reduce((s,c) => s + dailyMap[d][c], 0));
  const maxStack = (() => { const v = Math.max(1, ...dailyTotals); return isNaN(v) ? 1 : v; })();
  const hasData = dailyTotals.some(v => v > 0);
  if (!hasData) {
    ctx.fillStyle = '#999'; ctx.font = '14px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('本月暂无支出记录', W/2, H/2);
    return;
  }

  const pad = { top: 40, right: 20, bottom: 50, left: 50 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // 标题
  ctx.fillStyle = '#880e4f'; ctx.font = 'bold 14px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.fillText(`${months[0].slice(0,7)} 每日支出分类`, W/2, 20);

  // 计算堆叠 Y 轴最大值
  // Y轴
  ctx.strokeStyle = '#fce4ec'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch * (1 - i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#f48fb1'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxStack * i / 4), pad.left - 8, y + 4);
  }

  const barW = Math.min(12, cw / months.length * 0.7);
  const gap = cw / months.length;

  months.forEach((d, i) => {
    const x = pad.left + gap * i + (gap - barW) / 2;
    let stackY = pad.top + ch;
    cats.forEach((cat, ci) => {
      const v = dailyMap[d][cat];
      if (v <= 0) return;
      const barH = (v / maxStack) * ch;
      stackY -= barH;
      ctx.fillStyle = CAT_COLORS[ci % CAT_COLORS.length];
      ctx.fillRect(x, stackY, barW, barH);
    });
  });

  // X轴标签（1号/5的倍数/最后一天，避免相邻重叠）
  ctx.fillStyle = '#999'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
  months.forEach((d, i) => {
    const day = parseInt(d.split('-')[2]);
    const isLast = i === months.length - 1;
    const show = day === 1 || (day % 5 === 0) || isLast;
    if (show) {
      ctx.fillText(day, pad.left + gap * i + gap/2, H - 8);
    }
  });

  // 图例（放在 chart 底部与 X 轴标签之间，避免被裁切）
  ctx.textAlign = 'left';
  let lx = pad.left;
  const legendY = pad.top + ch + 16;
  EXPENSE_CATS.forEach((c, i) => {
    ctx.fillStyle = CAT_COLORS[i % CAT_COLORS.length];
    ctx.fillRect(lx, legendY, 10, 10);
    ctx.fillStyle = '#666'; ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText(c.name, lx + 13, legendY + 9);
    lx += ctx.measureText(c.name).width + 26;
  });
}

function updateTrendCards() {
  const cards = document.getElementById('trendCards');
  const today = currentDate;
  const txns = getLedgerData().filter(t => t.type === 'expense');

  // 本周（周一到今天）
  const td = parseDate(today);
  const dow = td.getDay();
  const monday = new Date(td); monday.setDate(td.getDate() - (dow === 0 ? 6 : dow - 1));
  const thisWeekDays = [];
  for (let i = 0; i < 7; i++) { const d = new Date(monday); d.setDate(monday.getDate() + i); thisWeekDays.push(fmtDate(d)); }
  const thisWeekTotal = txns.filter(t => thisWeekDays.includes(t.date)).reduce((s, t) => s + (Number(t.amount) || 0), 0);
  const thisWeekAvg = thisWeekDays.filter(d => d <= today).length > 0 ? thisWeekTotal / Math.max(1, thisWeekDays.filter(d => d <= today).length) : 0;

  // 上周
  const lastMonday = new Date(monday); lastMonday.setDate(monday.getDate() - 7);
  const lastWeekDays = [];
  for (let i = 0; i < 7; i++) { const d = new Date(lastMonday); d.setDate(lastMonday.getDate() + i); lastWeekDays.push(fmtDate(d)); }
  const lastWeekTotal = txns.filter(t => lastWeekDays.includes(t.date)).reduce((s, t) => s + (Number(t.amount) || 0), 0);
  const lastWeekAvg = lastWeekTotal / 7;

  // 本月
  const monthPrefix = today.slice(0, 7);
  const thisMonthTotal = txns.filter(t => t.date.startsWith(monthPrefix)).reduce((s, t) => s + (Number(t.amount) || 0), 0);

  // 上月
  const [y, m] = monthPrefix.split('-').map(Number);
  const lastMonth = m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  const lastMonthTotal = txns.filter(t => t.date.startsWith(lastMonth)).reduce((s, t) => s + (Number(t.amount) || 0), 0);

  function deltaHTML(cur, prev, unit) {
    if (prev === 0 || isNaN(cur) || isNaN(prev)) return `<div class="tc-delta flat">暂无对比数据</div>`;
    const pct = Math.round((cur - prev) / prev * 100);
    const dir = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
    const arrow = pct > 0 ? '↑' : pct < 0 ? '↓' : '→';
    return `<div class="tc-delta ${dir}">较上${unit === '日均' ? '周' : '月'} ${arrow} ${Math.abs(pct)}%</div>`;
  }

  cards.innerHTML = `
    <div class="trend-card">
      <div class="tc-label">本周日均支出</div>
      <div class="tc-value">¥${thisWeekAvg.toFixed(0)}</div>
      ${deltaHTML(thisWeekAvg, lastWeekAvg, '日均')}
    </div>
    <div class="trend-card">
      <div class="tc-label">本月总支出</div>
      <div class="tc-value">¥${thisMonthTotal.toFixed(0)}</div>
      ${deltaHTML(thisMonthTotal, lastMonthTotal, '总额')}
    </div>
    <div class="trend-card">
      <div class="tc-label">本周总支出</div>
      <div class="tc-value">¥${thisWeekTotal.toFixed(0)}</div>
      ${deltaHTML(thisWeekTotal, lastWeekTotal, '总额')}
    </div>
  `;
}

/* ═══════════════════ 完整备份 ═══════════════════ */
function exportFullBackup() {
  if (!_isLocalhost()) { showToast('请在本地服务器使用同步功能'); return; }

  var btn = document.getElementById('fullBackupBtn');
  if (!btn) return;

  var entries = loadEntries();
  var ledger = getLedgerData();
  var backup = { version: 1, exportedAt: new Date().toISOString(), entries, ledger };
  var filename = 'backup-' + new Date().getFullYear() + '.json';
  var content = JSON.stringify(backup, null, 2);

  btn.classList.add('syncing');
  btn.classList.remove('synced', 'sync-error');
  btn.textContent = '同步中...';
  btn.disabled = true;

  fetch(location.origin + '/api/git-sync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename: filename, content: content })
  })
  .then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  })
  .then(function() {
    btn.classList.remove('syncing');
    btn.classList.add('synced');
    btn.textContent = '已同步 \u2713';
    setTimeout(function() {
      btn.classList.remove('synced');
      btn.textContent = '完整备份同步';
      btn.disabled = false;
    }, 2000);
  })
  .catch(function() {
    btn.classList.remove('syncing');
    btn.classList.add('sync-error');
    btn.textContent = '同步失败';
    setTimeout(function() {
      btn.classList.remove('sync-error');
      btn.textContent = '完整备份同步';
      btn.disabled = false;
    }, 2000);
  });
}

/* 月度归档：导出上月 + 历史全量数据 → backup-YYYY.json */
function exportMonthlyArchive() {
  var now = new Date();
  var prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var y = prev.getFullYear();
  var entries = loadEntries();
  var ledger = getLedgerData();
  var backup = { version: 1, exportedAt: now.toISOString(), month: y + '-' + String(prev.getMonth() + 1).padStart(2, '0'), entries, ledger };
  downloadFile(JSON.stringify(backup, null, 2), 'backup-' + y + '.json', 'application/json;charset=utf-8');
  showToast('月度归档已导出: backup-' + y + '.json');
}

/* ── 定时备份 ── */
const SCHEDULE_KEY = 'backup_schedule_config';
let _scheduleTimer = null;

function loadScheduleConfig() {
  try { return JSON.parse(localStorage.getItem(SCHEDULE_KEY)); } catch(e) { return null; }
}
function saveScheduleConfig(cfg) { try { localStorage.setItem(SCHEDULE_KEY, JSON.stringify(cfg)); } catch(e) {} }
function clearScheduleConfig() { try { localStorage.removeItem(SCHEDULE_KEY); } catch(e) {} }

/* 计算距离下一个指定时刻的毫秒数（每天） */
function msUntilNextDaily(timeStr) {
  var parts = timeStr.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1]);
  var now = new Date();
  var target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  return target.getTime() - now.getTime();
}

/* 计算距离下一个指定日号 + 时刻的毫秒数，自动处理月末边界（31 号二月回退到 28/29） */
function msUntilNextMonthly(day, timeStr) {
  var parts = timeStr.split(':');
  var h = parseInt(parts[0]), m = parseInt(parts[1]);
  var now = new Date();
  var y = now.getFullYear(), mo = now.getMonth();
  var target = new Date(y, mo, 1, h, m, 0, 0);
  // 取目标月的最后一天，日号不能超出
  var lastDay = new Date(y, mo + 1, 0).getDate();
  var d = Math.min(day, lastDay);
  target.setDate(d);
  if (target <= now) {
    mo++;
    if (mo > 11) { mo = 0; y++; }
    target = new Date(y, mo, 1, h, m, 0, 0);
    lastDay = new Date(y, mo + 1, 0).getDate();
    target.setDate(Math.min(day, lastDay));
  }
  return target.getTime() - now.getTime();
}

function startScheduleTimer(cfg) {
  stopScheduleTimer();
  if (cfg.type === 'daily') {
    function scheduleNext() {
      _scheduleTimer = setTimeout(function() {
        exportFullBackup();
        scheduleNext();
      }, 24 * 3600 * 1000);
    }
    _scheduleTimer = setTimeout(function() {
      exportFullBackup();
      scheduleNext();
    }, msUntilNextDaily(cfg.time));
  } else {
    var day = cfg.day || 1;
    function scheduleNext() {
      _scheduleTimer = setTimeout(function() {
        exportMonthlyArchive();
        scheduleNext();
      }, msUntilNextMonthly(day, cfg.time));
    }
    _scheduleTimer = setTimeout(function() {
      exportMonthlyArchive();
      scheduleNext();
    }, msUntilNextMonthly(day, cfg.time));
  }
}

function stopScheduleTimer() {
  if (_scheduleTimer) { clearInterval(_scheduleTimer); clearTimeout(_scheduleTimer); _scheduleTimer = null; }
}

function onScheduleModeChange() {
  var mode = document.getElementById('scheduleMode').value;
  document.getElementById('scheduleDayGroup').style.display = mode === 'monthly' ? '' : 'none';
}

function initScheduleUI() {
  var cfg = loadScheduleConfig();
  var btn = document.getElementById('scheduleBtn');
  var status = document.getElementById('scheduleStatus');
  var modeEl = document.getElementById('scheduleMode');
  var dayEl = document.getElementById('scheduleDay');
  var timeEl = document.getElementById('scheduleTime');
  if (!btn || !status) return;

  if (cfg) {
    modeEl.value = cfg.type;
    modeEl.disabled = true;
    onScheduleModeChange();
    timeEl.value = cfg.time;
    timeEl.disabled = true;
    btn.textContent = '停止定时备份';
    btn.classList.add('stop');
    if (cfg.type === 'daily') {
      status.textContent = '运行中 · 每天 ' + cfg.time;
    } else {
      dayEl.value = cfg.day || 1;
      dayEl.disabled = true;
      status.textContent = '运行中 · 每月' + (cfg.day || 1) + '号 ' + cfg.time;
    }
    startScheduleTimer(cfg);
  } else {
    stopScheduleTimer();
    modeEl.disabled = false;
    dayEl.disabled = false;
    timeEl.disabled = false;
    btn.textContent = '启动定时备份';
    btn.classList.remove('stop');
    status.textContent = '';
  }
}

function toggleSchedule() {
  var cfg = loadScheduleConfig();
  if (cfg) {
    clearScheduleConfig();
    stopScheduleTimer();
    showToast('定时备份已停止');
    initScheduleUI();
  } else {
    var mode = document.getElementById('scheduleMode').value;
    var time = document.getElementById('scheduleTime').value || '00:00';
    var newCfg;
    if (mode === 'daily') {
      newCfg = { type: 'daily', time: time };
      showToast('定时备份已启动 · 每天 ' + time);
    } else {
      var day = parseInt(document.getElementById('scheduleDay').value) || 1;
      newCfg = { type: 'monthly', day: day, time: time };
      showToast('定时备份已启动 · 每月' + day + '号 ' + time);
    }
    saveScheduleConfig(newCfg);
    initScheduleUI();
  }
}
