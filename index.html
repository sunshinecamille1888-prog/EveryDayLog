<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>每日文档 - 计时记录工具</title>
<style>
    /* ── 颜色变量 ── */
    :root {
      --c-deep: #880e4f; --c-dark: #c2185b; --c-mid-dark: #d81b60;
      --c-primary: #e91e63; --c-accent: #f06292; --c-light: #f48fb1;
      --c-bg-mid: #f8bbd0; --c-bg: #fce4ec; --c-bg-light: #fff0f3;
      --c-text: #4a3040; --c-text-mid: #6d4c5e;
    }

    /* ── 薄荷绿 ── */
    body.theme-mint {
      --c-deep: #004d40; --c-dark: #00695c; --c-mid-dark: #00796b;
      --c-primary: #00897b; --c-accent: #26a69a; --c-light: #80cbc4;
      --c-bg-mid: #b2dfdb; --c-bg: #e0f2f1; --c-bg-light: #e8f5e9;
      --c-text: #263238; --c-text-mid: #546e7a;
    }

    /* ── 天空蓝 ── */
    body.theme-sky {
      --c-deep: #0d47a1; --c-dark: #1565c0; --c-mid-dark: #1976d2;
      --c-primary: #1e88e5; --c-accent: #42a5f5; --c-light: #90caf9;
      --c-bg-mid: #bbdefb; --c-bg: #e3f2fd; --c-bg-light: #e8eaf6;
      --c-text: #1a237e; --c-text-mid: #37474f;
    }

    /* ── 丁香紫 ── */
    body.theme-lavender {
      --c-deep: #4a148c; --c-dark: #6a1b9a; --c-mid-dark: #7b1fa2;
      --c-primary: #8e24aa; --c-accent: #ab47bc; --c-light: #ce93d8;
      --c-bg-mid: #e1bee7; --c-bg: #f3e5f5; --c-bg-light: #ede7f6;
      --c-text: #311b92; --c-text-mid: #5e35b1;
    }

    /* ── 暖橙 ── */
    body.theme-amber {
      --c-deep: #bf360c; --c-dark: #d84315; --c-mid-dark: #e65100;
      --c-primary: #f57c00; --c-accent: #ff9800; --c-light: #ffcc80;
      --c-bg-mid: #ffe0b2; --c-bg: #fff3e0; --c-bg-light: #fff8e1;
      --c-text: #3e2723; --c-text-mid: #795548;
    }

    /* ── 暗色模式 ── */
    body.theme-dark {
      --c-deep: #e0c28c; --c-dark: #d4a843; --c-mid-dark: #c9a84c;
      --c-primary: #b8942f; --c-accent: #8b6914; --c-light: #6b5a3a;
      --c-bg-mid: #3a3028; --c-bg: #2a241c; --c-bg-light: #1e1a14;
      --c-text: #e8dcc8; --c-text-mid: #b0a48a;
      background: #1a1610;
    }
    body.theme-dark .timer-panel,
    body.theme-dark .editor-panel,
    body.theme-dark .stats-panel,
    body.theme-dark .calendar-panel,
    body.theme-dark .tpl-card,
    body.theme-dark .month-picker { background: #2a241c; color: #e8dcc8; border-color: rgba(255,255,255,0.08); }
    body.theme-dark #editor,
    body.theme-dark .md-preview { background: #1e1a14; color: #e8dcc8; border-color: #3a3028; }
    body.theme-dark .et-btn { background: #3a3028; color: #b0a48a; }
    body.theme-dark .et-btn:hover { background: #4a4038; }
    body.theme-dark .et-btn.active { background: var(--c-primary); color: #fff; }
    body.theme-dark .custom-time { background: #1e1a14; color: #e8dcc8; border-color: #3a3028; }
    body.theme-dark .btn-reset,
    body.theme-dark .btn-clear,
    body.theme-dark .preset-btn,
    body.theme-dark .tb-btn,
    body.theme-dark .st-tab,
    body.theme-dark .btn-calendar,
    body.theme-dark .tpl-cancel,
    body.theme-dark .btn-today,
    body.theme-dark .calendar-header button { background: #3a3028; color: #d4a843; }
    body.theme-dark .preset-btn.selected { background: linear-gradient(135deg, #8b6914, #b8942f); color: #fff; }
    body.theme-dark .st-tab.active { background: linear-gradient(135deg, #8b6914, #b8942f); color: #fff; }
    body.theme-dark .tpl-option { border-color: #3a3028; }
    body.theme-dark .tpl-option:hover { background: #3a3028; }
    body.theme-dark .mp-item:hover { background: #3a3028; }
    body.theme-dark .mp-item.current { background: #b8942f; }
    body.theme-dark .mp-year-row button { background: #3a3028; color: #d4a843; }
    body.theme-dark .cal-tooltip { background: #555; }
    body.theme-dark .btn-calendar.active { background: linear-gradient(135deg, #8b6914, #b8942f); }
    body.theme-dark .btn-start { background: linear-gradient(135deg, #6b5a3a, #8b6914); }
    body.theme-dark .btn-record-time { background: linear-gradient(135deg, #6a4c8c, #8e5db0); }
    body.theme-dark .auto-cycle-toggle { color: #d4a843; }
    body.theme-dark .timer-display { color: #e0c28c; }
    body.theme-dark .date-title { color: #e0c28c; }
    body.theme-dark .btn-save { background: linear-gradient(135deg, #6b5a3a, #8b6914); }
    body.theme-dark .progress-bar-inner { background: linear-gradient(90deg, #8b6914, #d4a843); }
    body.theme-dark .cycle-indicator.focus { background: #3a3028; color: #d4a843; }
    body.theme-dark .calendar-day.today { box-shadow: 0 0 0 3px rgba(180,150,100,0.15); }
    body.theme-dark .calendar-day.selected { background: linear-gradient(135deg, #8b6914, #b8942f); }
    body.theme-dark .md-preview code { background: #3a3028; color: #d4a843; }
    body.theme-dark .md-preview pre { background: #3a3028; }
    body.theme-dark .theme-dot.active { border-color: #ccc; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
    body.theme-dark .month-picker { box-shadow: 0 8px 36px rgba(0,0,0,0.4); }


    /* ── 主题切换器 ── */
    .theme-switcher { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; flex-shrink: 0; }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: #555; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
    .theme-dot.t-pink { background: linear-gradient(135deg, #f06292, #e91e63); }
    .theme-dot.t-mint { background: linear-gradient(135deg, #26a69a, #00897b); }
    .theme-dot.t-sky { background: linear-gradient(135deg, #42a5f5, #1e88e5); }
    .theme-dot.t-lavender { background: linear-gradient(135deg, #ab47bc, #8e24aa); }
    .theme-dot.t-amber { background: linear-gradient(135deg, #ff9800, #f57c00); }


* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--c-bg) 0%, var(--c-bg-mid) 50%, var(--c-bg) 100%); color: var(--c-text); min-height: 100vh; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
/* 允许输入框和文本域正常选中 */
input, textarea, select, [contenteditable] { -webkit-user-select: text; user-select: text; }
button, a, .clickable, [onclick] { cursor: pointer; touch-action: manipulation; }
.app { display: flex; max-width: 1100px; margin: 0 auto; padding: 16px; gap: 16px; min-height: 100vh; }

/* ---- 左侧：紧凑日历 ---- */
.sidebar { width: 0; overflow: hidden; flex-shrink: 0; transition: width 0.3s ease; }
.sidebar.show { width: 250px; }
.calendar-panel { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(255,105,135,0.12); width: 250px; }
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.calendar-header button { background: var(--c-bg-light); border: none; border-radius: 10px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; color: var(--c-primary); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.calendar-header button:hover { background: var(--c-bg); transform: scale(1.05); }
.calendar-month { font-weight: 700; font-size: 13px; color: var(--c-mid-dark); }
.calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: var(--c-light); margin-bottom: 6px; font-weight: 600; }
.calendar-weekdays span { padding: 3px 0; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; position: relative; transition: all 0.15s; color: var(--c-text-mid); z-index:0; overflow: hidden; min-height: 32px; }
.calendar-day .day-num { line-height: 1; font-size: 13px; z-index: 1; }
.calendar-day .day-mood { font-size: 10px; line-height: 1; z-index: 1; margin-top: 1px; }
/* 热力背景层 */
.calendar-day::before { content: ''; position: absolute; inset: 2px; border-radius: 8px; z-index: 0; transition: background 0.3s, opacity 0.3s; }
.calendar-day.heat-1::before { background: var(--c-bg-light); opacity: 0.3; }
.calendar-day.heat-2::before { background: var(--c-bg); opacity: 0.45; }
.calendar-day.heat-3::before { background: var(--c-bg-mid); opacity: 0.6; }
.calendar-day.heat-4::before { background: var(--c-accent); opacity: 0.4; }
.calendar-day:hover { transform: scale(1.08); z-index: 2; }
.calendar-day:hover::before { opacity: 0.75; }
.calendar-day.empty { cursor: default; color: #ccc; font-weight: 400; }
.calendar-day.empty:hover { transform: none; background: none; }
.calendar-day.empty:hover::before { opacity: 0; }
.calendar-day.today { color: var(--c-primary); border: 2px solid var(--c-primary); box-shadow: 0 0 0 3px var(--c-bg-light); }
.calendar-day.selected { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; box-shadow: 0 2px 8px rgba(233,30,99,0.35); }
.calendar-day.selected::before { display: none; }
.calendar-day.selected.today { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; border: 2px solid var(--c-dark); box-shadow: 0 0 0 3px rgba(233,30,99,0.25); }
.calendar-day .indicator { display: none; }
/* 悬浮提示 */
.cal-tooltip { position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 6px; white-space: nowrap; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.15s; line-height: 1.5; text-align: center; max-width: 160px; }
.calendar-day:hover .cal-tooltip { opacity: 1; }
/* 月/年选择器 */
.cal-month-title { cursor: pointer; user-select: none; }
.cal-month-title:hover { opacity: 0.7; }
.month-picker-overlay { display: none; position: fixed; inset: 0; z-index: 90; }
.month-picker-overlay.show { display: block; }
.month-picker { display: none; position: absolute; top: 100%; left: 0; margin-top: 6px; background: #fff; border-radius: 14px; box-shadow: 0 8px 36px rgba(0,0,0,0.15); padding: 14px; z-index: 95; min-width: 230px; }
.month-picker.show { display: block; }
.mp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.mp-item { padding: 7px 8px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 12px; color: var(--c-text-mid); transition: all 0.15s; }
.mp-item:hover { background: var(--c-bg); }
.mp-item.current { background: var(--c-primary); color: #fff; font-weight: 700; }
.mp-year-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 700; color: var(--c-deep); }
.mp-year-row button { background: var(--c-bg); border: none; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 15px; color: var(--c-primary); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.mp-year-row button:hover { background: var(--c-bg-mid); }

/* 日历底部 */
.calendar-footer { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
.calendar-footer .btn-today { background: var(--c-bg); border: none; color: var(--c-primary); padding: 6px 14px; border-radius: 12px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.calendar-footer .btn-today:hover { background: var(--c-bg-mid); }
.calendar-footer .stat { font-size: 11px; color: var(--c-light); }

/* ---- 右侧主面板 ---- */
.main { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0; }

/* 日期标题 */
.date-header { display: flex; align-items: center; gap: 10px; }
.date-title { font-size: 18px; font-weight: 800; color: var(--c-deep); }
.date-timer-summary { font-size: 13px; color: var(--c-primary); font-weight: 600; margin-left: auto; }
.btn-calendar { background: var(--c-bg); border: none; color: var(--c-primary); padding: 7px 16px; border-radius: 14px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
.btn-calendar:hover { background: var(--c-bg-mid); transform: translateY(-1px); }
.btn-calendar.active { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; box-shadow: 0 2px 8px rgba(233,30,99,0.3); }
.btn-calendar.active:hover { background: linear-gradient(135deg, var(--c-primary), var(--c-dark)); }

/* 计时器 */
.timer-panel { background: #fff; border-radius: 18px; padding: 20px 24px; box-shadow: 0 4px 20px rgba(255,105,135,0.1); display: flex; flex-direction: column; gap: 14px; }
.timer-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.timer-display { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--c-mid-dark); letter-spacing: 3px; line-height: 1; }
.timer-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.timer-controls button, .preset-btn { border: none; padding: 9px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-start { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; box-shadow: 0 2px 8px rgba(233,30,99,0.25); }
.btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,30,99,0.35); }
.btn-pause { background: linear-gradient(135deg, #ffb74d, #ff9800); color: #fff; }
.btn-pause:hover { transform: translateY(-1px); }
.btn-reset { background: var(--c-bg); color: var(--c-dark); font-size: 12px; padding: 8px 14px; }
.btn-reset:hover { background: var(--c-bg-mid); }
.btn-record-time { background: linear-gradient(135deg, #ce93d8, #ab47bc); color: #fff; box-shadow: 0 2px 8px rgba(171,71,188,0.2); }
.btn-record-time:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(171,71,188,0.3); }

/* 预设时长 */
.preset-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.preset-btn { background: var(--c-bg-light); color: var(--c-mid-dark); padding: 7px 14px; border-radius: 16px; font-size: 12px; }
.preset-btn:hover { background: var(--c-bg); }
.preset-btn.selected { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; }
.custom-time { border: 2px solid var(--c-bg); border-radius: 14px; padding: 6px 10px; font-size: 12px; width: 80px; text-align: center; color: var(--c-mid-dark); font-weight: 600; outline: none; background: #fff; }
.custom-time::-webkit-inner-spin-button,
.custom-time::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.custom-time { -moz-appearance: textfield; }
.custom-time:focus { border-color: var(--c-accent); }
.custom-time::placeholder { color: var(--c-light); }

/* 进度环 */
.timer-progress { display: flex; align-items: center; gap: 12px; }
.progress-bar-wrap { flex: 1; height: 6px; background: var(--c-bg); border-radius: 3px; overflow: hidden; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--c-accent), var(--c-primary)); border-radius: 3px; transition: width 0.5s linear; width: 0%; }
.timer-session-info { font-size: 12px; color: var(--c-light); white-space: nowrap; font-weight: 500; }

/* 完成提示 */
.timer-done { font-size: 13px; color: #4caf50; font-weight: 700; }

/* 番茄循环 */
.cycle-indicator { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 700; }
.cycle-indicator.focus { background: var(--c-bg); color: var(--c-primary); }
.cycle-indicator.break { background: #e8f5e9; color: #4caf50; }
.round-counter { font-size: 11px; color: var(--c-light); }
.auto-cycle-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--c-dark); font-weight: 600; cursor: pointer; user-select: none; }
.auto-cycle-toggle input { accent-color: var(--c-primary); }
.cycle-settings { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--c-light); }
.cycle-settings input { width: 44px; border: 2px solid var(--c-bg); border-radius: 8px; padding: 2px 4px; text-align: center; font-size: 11px; color: var(--c-mid-dark); outline: none; }
.cycle-settings input:focus { border-color: var(--c-accent); }

/* 标签 */

/* 编辑器 */
.editor-panel { background: #fff; border-radius: 18px; padding: 14px 20px; box-shadow: 0 4px 20px rgba(255,105,135,0.1); flex: 1; display: flex; flex-direction: column; gap: 6px; }
.editor-toolbar { display: flex; justify-content: space-between; align-items: center; }
.editor-toolbar .et-label { font-size: 13px; font-weight: 700; color: var(--c-text-mid); }
.editor-toolbar .et-actions { display: flex; gap: 6px; }
.et-btn { background: var(--c-bg-light); border: none; color: var(--c-primary); padding: 5px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
.et-btn:hover { background: var(--c-bg); }
.et-btn.active { background: var(--c-primary); color: #fff; }
#editor { flex: 1; width: 100%; min-height: 120px; border: 1.5px solid #e8e0e4; border-radius: 12px; padding: 10px 14px; font-size: 14px; line-height: 1.6; resize: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; outline: none; transition: border 0.2s, box-shadow 0.2s; color: var(--c-text); background: #fff; }
#editor:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(240,98,146,0.08); }
#editor::placeholder { color: #c0b0b8; }
.editor-actions { display: flex; gap: 8px; }
.editor-actions button { border: none; padding: 7px 18px; border-radius: 18px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-save { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; box-shadow: 0 2px 8px rgba(233,30,99,0.25); }
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(233,30,99,0.35); }
.btn-clear { background: var(--c-bg); color: var(--c-dark); }
.btn-clear:hover { background: var(--c-bg-mid); }
/* 备份导入按钮 —— 跟随主题色自适应 */
.btn-backup, .btn-import { border: none; padding: 8px 20px; border-radius: 18px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; box-shadow: 0 2px 8px rgba(233,30,99,0.15); }
.btn-backup:hover, .btn-import:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(233,30,99,0.25); }

/* GitHub 同步按钮 */
.btn-git-sync { border: none; padding: 8px 20px; border-radius: 18px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; background: #9e9e9e; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.btn-git-sync:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
.btn-git-sync:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-git-sync.syncing { background: linear-gradient(135deg, #ffb74d, #ff9800); box-shadow: 0 2px 8px rgba(255,152,0,0.3); animation: sync-pulse 0.8s infinite; }
.btn-git-sync.synced { background: linear-gradient(135deg, #66bb6a, #43a047); box-shadow: 0 2px 8px rgba(76,175,80,0.3); }
.btn-git-sync.sync-error { background: linear-gradient(135deg, #ef5350, #e53935); box-shadow: 0 2px 8px rgba(229,57,53,0.3); }
.btn-backup.syncing { background: linear-gradient(135deg, #ffb74d, #ff9800); box-shadow: 0 2px 8px rgba(255,152,0,0.3); animation: sync-pulse 0.8s infinite; }
.btn-backup.synced { background: linear-gradient(135deg, #66bb6a, #43a047); box-shadow: 0 2px 8px rgba(76,175,80,0.3); }
.btn-backup.sync-error { background: linear-gradient(135deg, #ef5350, #e53935); box-shadow: 0 2px 8px rgba(229,57,53,0.3); }
@keyframes sync-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; box-shadow: 0 4px 16px rgba(233,30,99,0.3); }
.toast.show { opacity: 1; }

/* 按钮面板 */
.tab-panel { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(255,105,135,0.08); min-height: 60px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-content .tpl-preview { white-space: pre-wrap; font-size: 13px; color: var(--c-text-mid); line-height: 1.7; padding: 8px; background: var(--c-bg); border-radius: 8px; }
body.theme-dark .tab-panel { background: #2a241c; }
body.theme-dark .tab-content .tpl-preview { background: #1e1a14; }
body.focus-mode .tab-panel { display: none !important; }

/* 每日计划卡片 */
.plan-card { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.plan-btn { background: #fff; color: var(--c-text-mid); border: 1.5px solid #e8e0e4; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; box-shadow: none; cursor: pointer; transition: all 0.15s; }
.plan-btn:hover { border-color: var(--c-accent); color: var(--c-primary); }
.plan-btn.active { border-color: var(--c-primary); color: var(--c-primary); background: var(--c-bg-light); }
body.theme-dark .plan-btn { background: #2a241c; border-color: #3a3028; color: #b0a48a; }
body.theme-dark .plan-btn:hover { border-color: #d4a843; color: #d4a843; }
body.theme-dark .plan-btn.active { border-color: #d4a843; color: #d4a843; background: #1e1a14; }

/* Markdown 预览 */
.md-preview { flex: 1; width: 100%; min-height: 220px; border: 1.5px solid #e8e0e4; border-radius: 12px; padding: 14px 16px; overflow-y: auto; background: #fff; line-height: 1.8; font-size: 14px; color: var(--c-text); }
.md-preview h1 { font-size: 21px; color: var(--c-deep); border-bottom: 1.5px solid var(--c-bg); padding-bottom: 5px; margin-bottom: 10px; }
.md-preview h2 { font-size: 17px; color: var(--c-dark); margin: 12px 0 6px; }
.md-preview h3 { font-size: 14px; color: var(--c-mid-dark); margin: 10px 0 4px; }
.md-preview ul, .md-preview ol { padding-left: 18px; margin: 5px 0; }
.md-preview li { margin: 2px 0; font-size: 13px; }
.md-preview code { background: var(--c-bg-light); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--c-dark); }
.md-preview pre { background: #faf8fc; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; border: 1px solid #e8e0e4; }
.md-preview pre code { background: none; padding: 0; border: none; }
.md-preview strong { color: var(--c-deep); }
.md-preview blockquote { border-left: 3px solid var(--c-light); padding: 4px 12px; color: var(--c-dark); margin: 6px 0; background: var(--c-bg-light); border-radius: 0 6px 6px 0; }
.md-preview a { color: var(--c-primary); }
.md-preview p { margin: 4px 0; }

/* 统计面板 */
.stats-panel { background: #fff; border-radius: 18px; padding: 20px 24px; box-shadow: 0 4px 20px rgba(255,105,135,0.1); }
.stats-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.stats-title { font-size: 16px; font-weight: 700; color: var(--c-deep); }
.stats-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.st-tab { background: var(--c-bg-light); border: none; color: var(--c-mid-dark); padding: 5px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.st-tab:hover { background: var(--c-bg); }
.st-tab.active { background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; }
.stats-chart-wrap { display: flex; justify-content: center; overflow: visible; }
#statsCanvas { width: 100%; aspect-ratio: 600 / 240; display: block; }

/* 热力图 */
.heatmap-container { width: 100%; }
.heatmap-grid { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; font-size: 11px; margin-bottom: 8px; }
.heatmap-grid .hm-label { color: var(--c-light); display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; font-weight: 600; }
.heatmap-grid .hm-cell { aspect-ratio: 1; border-radius: 3px; transition: background 0.2s; min-width: 14px; }
.heatmap-legend { display: flex; align-items: center; gap: 4px; justify-content: center; font-size: 11px; color: var(--c-light); }
.hl-box { width: 14px; height: 14px; border-radius: 3px; }
.hl-1 { background: var(--c-bg); } .hl-2 { background: var(--c-bg-mid); } .hl-3 { background: var(--c-accent); } .hl-4 { background: var(--c-primary); } .hl-5 { background: var(--c-deep); }

/* ── 导出备份 ── */
.export-section { border-top: 1px solid var(--c-bg); margin-top: 14px; padding-top: 14px; }
.export-header { font-size: 14px; font-weight: 700; color: var(--c-deep); margin-bottom: 10px; }
.export-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.export-row select { border: 2px solid var(--c-bg); border-radius: 12px; padding: 6px 12px; font-size: 12px; color: var(--c-mid-dark); outline: none; background: #fff; font-weight: 600; cursor: pointer; }
.export-row select:focus { border-color: var(--c-accent); }
body.theme-dark .export-row select { background: #1e1a14; color: #e8dcc8; border-color: #3a3028; }
.export-row input[type="month"] { border: 2px solid var(--c-bg); border-radius: 12px; padding: 6px 10px; font-size: 12px; color: var(--c-mid-dark); outline: none; background: #fff; font-weight: 600; }
.export-row input[type="month"]:focus { border-color: var(--c-accent); }
body.theme-dark .export-row input[type="month"] { background: #1e1a14; color: #e8dcc8; border-color: #3a3028; }
/* 定时备份面板 */
.schedule-label { font-size: 13px; font-weight: 600; color: var(--c-deep); }
.schedule-input { width: 56px; border: 2px solid var(--c-bg); border-radius: 10px; padding: 5px 6px; font-size: 13px; color: var(--c-mid-dark); text-align: center; outline: none; background: #fff; font-weight: 600; }
.schedule-input:focus { border-color: var(--c-accent); }
.schedule-unit { border: 2px solid var(--c-bg); border-radius: 10px; padding: 5px 6px; font-size: 12px; color: var(--c-mid-dark); outline: none; background: #fff; font-weight: 600; cursor: pointer; }
.schedule-unit:focus { border-color: var(--c-accent); }
.btn-schedule { border: none; border-radius: 14px; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: linear-gradient(135deg, var(--c-accent), var(--c-primary)); color: #fff; }
.btn-schedule:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-schedule.stop { background: linear-gradient(135deg, #e57373, #c62828); }
.schedule-status { font-size: 11px; color: var(--c-accent); margin-left: 4px; }
body.theme-dark .schedule-input,
body.theme-dark .schedule-unit { background: #1e1a14; color: #e8dcc8; border-color: #3a3028; }
body.theme-dark .schedule-status { color: #b8942f; }

/* 模板弹窗 */
.tpl-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
.tpl-card { background: #fff; border-radius: 20px; padding: 24px; width: 360px; max-width: 92vw; box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
.tpl-card h3 { color: var(--c-deep); margin-bottom: 14px; }
.tpl-option { padding: 10px 14px; border-radius: 12px; cursor: pointer; margin-bottom: 6px; border: 2px solid var(--c-bg); transition: all 0.2s; font-size: 13px; color: var(--c-text-mid); }
.tpl-option:hover { border-color: var(--c-accent); background: var(--c-bg); }
.tpl-option .tpl-name { font-weight: 700; color: var(--c-dark); }
.tpl-option .tpl-desc { font-size: 11px; color: var(--c-light); }
.tpl-cancel { display: block; margin: 12px auto 0; background: var(--c-bg); border: none; color: var(--c-dark); padding: 8px 24px; border-radius: 14px; font-size: 13px; cursor: pointer; font-weight: 600; }


/* ── 全屏专注模式 ── */
body.focus-mode .app { padding: 0; max-width: 100%; }
body.focus-mode .sidebar,
body.focus-mode .editor-panel,
body.focus-mode .stats-panel,
body.focus-mode .date-header,
body.focus-mode .preset-row,
body.focus-mode .timer-row:has(.timer-controls) .cycle-indicator,
body.focus-mode .timer-row:has(.timer-controls) .timer-controls,
body.focus-mode #autoCycleToggle,
body.focus-mode #cycleSettings { display: none !important; }
body.focus-mode .main { gap: 0; }
body.focus-mode .timer-panel {
  background: rgba(255,255,255,0.03); box-shadow: none; border-radius: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px;
}
body.focus-mode.theme-dark .timer-panel { background: transparent; }
body.focus-mode .timer-display {
  font-size: clamp(80px, 18vw, 200px); letter-spacing: 8px;
  font-variant-numeric: tabular-nums;
}
body.focus-mode .timer-row { justify-content: center; }
body.focus-mode .timer-progress { width: 100%; max-width: 600px; }
body.focus-mode .progress-bar-wrap { height: 8px; border-radius: 4px; }
body.focus-mode .timer-row:has(.timer-done) .timer-done { font-size: 24px; }
.focus-exit-btn {
  position: fixed; top: 24px; right: 24px; z-index: 200;
  background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15); color: #fff;
  padding: 10px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600;
  transition: all 0.2s; display: none;
}
body.focus-mode .focus-exit-btn { display: block; }
body.theme-dark .focus-exit-btn { background: rgba(255,255,255,0.06); }
.focus-exit-btn:hover { background: rgba(255,255,255,0.2); }
.focus-hint { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.25); font-size: 13px; display: none; z-index: 200; }
body.focus-mode .focus-hint { display: block; }
body.theme-dark .focus-hint { color: rgba(255,255,255,0.15); }

/* ── 预备倒计时 ── */
.countdown-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300;
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
.countdown-overlay.show { display: flex; }
.countdown-overlay .cd-number {
  font-size: clamp(100px, 25vw, 240px); font-weight: 900; color: #fff;
  text-shadow: 0 0 60px rgba(255,255,255,0.3); animation: cdPulse 0.5s ease-out;
  font-variant-numeric: tabular-nums;
}
@keyframes cdPulse {
  0% { transform: scale(1.4); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}
.countdown-overlay .cd-label { color: rgba(255,255,255,0.5); font-size: 18px; letter-spacing: 0.1em; }

/* ── 音效开关 ── */
.sound-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--c-dark); font-weight: 600; cursor: pointer; user-select: none; background: var(--c-bg-light); border: none; padding: 6px 12px; border-radius: 14px; transition: all 0.2s; }
.sound-toggle:hover { background: var(--c-bg); }
.sound-toggle input { accent-color: var(--c-primary); }

@media (max-width: 700px) {
  .app { flex-direction: column; padding: 12px 8px; gap: 10px; }
  .sidebar:not(.show) { height: 0; flex-shrink: 1; }
  .sidebar.show { width: 100%; height: auto; flex-shrink: 0; }
  .calendar-panel { width: 100%; }
  .main { padding: 12px; border-radius: 16px; }

  /* 底部安全区域适配 */
  .app { padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); }
  .toast { bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }

  /* 按钮最小触摸区域 44px */
  button, .preset-btn, .tb-btn, .st-tab, .btn-save, .btn-start, .btn-clear,
  .btn-reset, .btn-record-time, .btn-calendar, .btn-today, .et-btn, .plan-btn,
  .btn-schedule, .theme-dot, .tpl-cancel, .mp-item, .l-btn, .mood-btn {
    min-height: 44px; min-width: 44px;
  }

  /* 字体适配 */
  .timer-display { font-size: 56px; }
  .date-title { font-size: 17px; }
  .editor-panel, .ledger-panel, .stats-panel { padding: 14px 12px; border-radius: 14px; }
  #editor { font-size: 14px; padding: 12px; min-height: 180px; }
  .ledger-form { flex-direction: column; align-items: stretch; gap: 8px; }
  .ledger-form select, .ledger-form input { width: 100%; font-size: 14px; padding: 10px 12px; }
  .ledger-form .l-btn { width: 100%; text-align: center; padding: 10px; font-size: 14px; }
  .calendar-header { padding: 10px; }
  .calendar-day { min-height: 36px; font-size: 13px; }
  .preset-row { gap: 6px; flex-wrap: wrap; }
  .preset-btn { padding: 8px 10px; font-size: 12px; }
  .timer-controls { gap: 6px; }
  .btn-start, .btn-pause { padding: 10px 32px; font-size: 15px; }
  .plan-row { flex-wrap: wrap; gap: 4px; }
  .plan-btn { padding: 6px 10px; font-size: 11px; }
  .stats-tabs { flex-wrap: wrap; gap: 4px; }
  .st-tab { padding: 6px 10px; font-size: 12px; }
  .trend-cards { flex-direction: column; }
  .trend-card { min-width: auto; }
  .cycle-settings { flex-wrap: wrap; gap: 4px; }
  .theme-switcher { gap: 4px; }
  .theme-dot { width: 28px; height: 28px; }
  .focus-exit-btn { bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }
  .focus-hint { bottom: calc(70px + env(safe-area-inset-bottom, 0px)); }
  .countdown-overlay .cd-label { font-size: 18px; }
  .countdown-overlay .cd-number { font-size: 72px; }

  /* 记账列表编辑表单 */
  .l-edit-form { flex-wrap: wrap; gap: 6px; }
  .l-edit-form select, .l-edit-form input { width: 100%; min-height: 40px; font-size: 14px; }
  .l-edit-save, .l-edit-cancel { min-height: 40px; padding: 8px 16px; font-size: 14px; }

  /* 移动端头部重组 */
  .date-header { flex-wrap: wrap; gap: 6px; }
  .theme-switcher { display: none !important; }
  .sound-toggle { font-size: 0; padding: 6px 8px; gap: 0; }
  .sound-toggle #soundIcon { font-size: 15px; }
  .btn-calendar { padding: 6px 10px; font-size: 11px; }
  .date-timer-summary { font-size: 12px; margin-left: 0; }
  .device-tag { font-size: 9px; padding: 1px 6px; }

  /* 热力图紧凑布局 */
  .heatmap-grid { gap: 1px; font-size: 10px; grid-template-columns: 28px repeat(24, 1fr); }
  .heatmap-grid .hm-cell { min-width: 0; }
  .heatmap-grid .hm-label { font-size: 9px; padding-right: 2px; }

  /* 面板紧凑 */
  .timer-panel { padding: 14px 12px; }
  .timer-row { gap: 8px; }
  .timer-controls { gap: 4px; }
  .ledger-panel { padding: 14px 12px; margin-top: 10px; }
  .stats-panel { padding: 14px 12px; }
}

/* ── 记账面板 ── */
.ledger-panel { background: #fff; border-radius: 18px; padding: 20px 24px; box-shadow: 0 4px 20px rgba(255,105,135,0.1); margin-top: 14px; }
.ledger-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.ledger-title { font-size: 16px; font-weight: 700; color: var(--c-deep); }
.ledger-summary { font-size: 14px; font-weight: 600; }
.ledger-summary .ls-income { color: #4caf50; margin-right: 14px; }
.ledger-summary .ls-expense { color: #e53935; }

/* ── 今日金额条 ── */
.ledger-day-bar { display: flex; height: 28px; border-radius: 14px; overflow: hidden; margin-bottom: 12px; background: #f0f0f0; font-size: 11px; font-weight: 700; line-height: 28px; }
.ledger-day-bar .ldb-income { background: #c8e6c9; color: #2e7d32; text-align: left; padding-left: 8px; white-space: nowrap; overflow: hidden; transition: flex 0.4s ease; }
.ledger-day-bar .ldb-expense { background: #ffcdd2; color: #c62828; text-align: right; padding-right: 8px; white-space: nowrap; overflow: hidden; transition: flex 0.4s ease; }
.ledger-day-bar .ldb-none { flex: 1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #999; font-weight: 400; }
body.theme-dark .ledger-day-bar { background: #2a241c; }
body.theme-dark .ledger-day-bar .ldb-income { background: #1b5e20; color: #a5d6a7; }
body.theme-dark .ledger-day-bar .ldb-expense { background: #b71c1c; color: #ef9a9a; }
body.theme-dark .ledger-day-bar .ldb-none { background: #2a241c; color: #777; }

/* ── 当日支出分类排行 ── */
.ledger-cat-breakdown { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.ledger-cat-breakdown .lcb-tag { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; background: #f5f5f5; color: #666; }
body.theme-dark .ledger-cat-breakdown .lcb-tag { background: #2a241c; color: #aaa; }

/* ── 时间戳 ── */
.l-item .l-time { font-size: 10px; color: var(--c-light); width: 34px; flex-shrink: 0; text-align: center; }

/* ── 记账面板 Mini 折线图 ── */
.ledger-mini-chart { margin-top: 12px; border-radius: 12px; background: var(--c-bg-light); padding: 8px 0; }
.ledger-mini-chart canvas { display: block; margin: 0 auto; }
body.theme-dark .ledger-mini-chart { background: #1e1a14; }

/* ── 支出趋势指标卡片 ── */
.trend-cards { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.trend-card { flex: 1; min-width: 140px; border-radius: 14px; padding: 14px 16px; background: #f9f9f9; border: 1.5px solid #eee; }
.trend-card .tc-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.trend-card .tc-value { font-size: 20px; font-weight: 800; color: var(--c-deep); }
.trend-card .tc-delta { font-size: 11px; margin-top: 4px; }
.trend-card .tc-delta.up { color: #e53935; }
.trend-card .tc-delta.down { color: #4caf50; }
.trend-card .tc-delta.flat { color: #999; }
body.theme-dark .trend-card { background: #2a241c; border-color: #3a3028; }
body.theme-dark .trend-card .tc-value { color: #e8dcc8; }
body.theme-dark .trend-card .tc-label { color: #888; }

/* ── 支出趋势饼图容器 ── */
.trend-pie-row { display: flex; gap: 16px; align-items: flex-start; margin-top: 12px; flex-wrap: wrap; }
.trend-legend { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 11px; }
.trend-legend .tl-item { display: flex; align-items: center; gap: 4px; }
.trend-legend .tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.ledger-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; padding: 12px; border-radius: 12px; background: var(--c-bg-light); border: 1.5px solid #e8e0e4; }
.ledger-form select, .ledger-form input { border: 1.5px solid #e8e0e4; border-radius: 10px; padding: 6px 10px; font-size: 12px; color: var(--c-mid-dark); outline: none; background: #fff; font-weight: 600; }
.ledger-form select:focus, .ledger-form input:focus { border-color: var(--c-accent); }
.ledger-form .l-type { width: 70px; }
.ledger-form .l-amount { width: 90px; }
.ledger-form .l-cat { width: 90px; }
.ledger-form .l-note { width: 120px; }
.ledger-form .l-btn { border: 1.5px solid #e8e0e4; padding: 7px 18px; border-radius: 16px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; background: #fff; color: var(--c-accent); }
.ledger-form .l-btn:hover { transform: translateY(-1px); background: var(--c-accent); color: #fff; }
body.theme-dark .ledger-panel { background: #2a241c; color: #e8dcc8; }
body.theme-dark .ledger-form { background: #1e1a14; border-color: #3a3028; }
body.theme-dark .ledger-form select, body.theme-dark .ledger-form input { background: #1e1a14; color: #e8dcc8; border-color: #3a3028; }
body.theme-dark .ledger-form .l-btn { background: #1e1a14; border-color: #3a3028; color: #e8dcc8; }
body.theme-dark .ledger-form .l-btn:hover { background: var(--c-accent); color: #fff; }
.ledger-list { max-height: 280px; overflow-y: auto; }
.ledger-list::-webkit-scrollbar { width: 4px; }
.ledger-list::-webkit-scrollbar-thumb { background: var(--c-bg-mid); border-radius: 2px; }
.l-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 12px; transition: background 0.15s; }
.l-item:hover { background: var(--c-bg-light); }
body.theme-dark .l-item:hover { background: var(--c-bg); }
/* ── 月度汇总条 ── */
.ledger-month-summary { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: 12px; background: linear-gradient(135deg, var(--c-bg-light), var(--c-bg)); margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
.ledger-month-summary .lms-item { text-align: center; flex: 1; min-width: 60px; }
.ledger-month-summary .lms-label { font-size: 11px; color: var(--c-light); margin-bottom: 2px; }
.ledger-month-summary .lms-value { font-size: 16px; font-weight: 800; }
.ledger-month-summary .lms-value.income { color: #4caf50; }

<script>
const STORAGE_KEY = 'daily_doc_entries';
let currentDate = getToday();
let calYear, calMonth;
let activeTemplateLabel = null; // 当前激活的模板标签名

function getToday() { const d=new Date(); return fmtDate(d); }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function formatDate(dateStr) {
  const d = parseDate(dateStr);
  const wd = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${wd[d.getDay()]}`;
}
function shortDate(dateStr) {
  const d = parseDate(dateStr);
  const wd = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}月${d.getDate()}日 周${wd[d.getDay()]}`;
}
function fmtDuration(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  if (h > 0) return `${h}时${m}分`;
  return `${m}分`;
}

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveEntries(entries) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {} }


// ====== 日历 ======
function renderCalendar(year, month) {
  calYear = year; calMonth = month;
  document.getElementById('calMonth').textContent = `${year}年${month+1}月`;
  const grid = document.getElementById('calGrid');
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = getToday();
  const entries = loadEntries();

  // 计算本月最大时长，用于热力分级
  let maxDur = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = formatDateStr(year, month, d);
    const dur = (entries[ds] && entries[ds].duration) || 0;
    if (dur > maxDur) maxDur = dur;
  }

  function getHeat(dur) {
    if (!dur || !maxDur) return '';
    const ratio = dur / maxDur;
    if (ratio < 0.01) return '';
    if (ratio < 0.25) return ' heat-1';
    if (ratio < 0.5)  return ' heat-2';
    if (ratio < 0.75) return ' heat-3';
    return ' heat-4';
  }

  let totalDays = 0, totalMins = 0;
  let html = '';

  // 填充前置空白格
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="calendar-day empty"></div>';
  }

  const moodEmojis = ['', '😡', '😢', '😐', '🤩', '😊'];

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = formatDateStr(year, month, d);
    const entry = entries[ds];
    const dur = entry && entry.duration ? entry.duration : 0;
    let cls = 'calendar-day' + getHeat(dur);
    if (ds === today) cls += ' today';
    if (ds === currentDate) cls += ' selected';

    // 统计
    if (dur || (entry && entry.content)) { totalDays++; totalMins += Math.floor(dur / 60); }

    // tooltip：鼠标悬浮显示计时信息
    let tooltip = '';
    if (dur) {
      const h = Math.floor(dur / 3600);
      const m = Math.floor((dur % 3600) / 60);
      tooltip = `<span class="cal-tooltip">${h > 0 ? h + '时' + m + '分' : m + '分'}</span>`;
    }

    // 心情 emoji
    let moodHtml = '';
    if (entry && entry.mood && moodEmojis[entry.mood]) {
      moodHtml = `<span class="day-mood">${moodEmojis[entry.mood]}</span>`;
    }

    html += `<div class="${cls}" onclick="setDate('${ds}')">
      <span class="day-num">${d}</span>${moodHtml}${tooltip}
    </div>`;
  }

  grid.innerHTML = html;

  const totalH = totalMins >= 60 ? `${Math.floor(totalMins/60)}时${totalMins%60}分` : `${totalMins}分`;
  document.getElementById('statInfo').textContent = totalMins > 0
    ? `${totalDays}天有记录 · 共${totalH}`
    : `${totalDays} 天有记录`;

  // 更新月视图摘要
  renderMonthSummary(year, month, entries);
}

function formatDateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function prevMonth() {
  if (calMonth === 0) { calMonth = 11; calYear--; } else calMonth--;
  renderCalendar(calYear, calMonth);
}
function nextMonth() {
  if (calMonth === 11) { calMonth = 0; calYear++; } else calMonth++;
  renderCalendar(calYear, calMonth);
}

// ====== 日期切换 ======
function setDate(dateStr) {
  currentDate = dateStr;
  _pendingTemplateContents = null;
  showDailyQuote();
  document.getElementById('dateTitle').textContent = formatDate(dateStr);
  const entries = loadEntries();
  const entry = entries[dateStr] || { content: '', duration: 0 };
  document.getElementById('editor').value = entry.content || '';

  // 初始不展示编辑器面板，由按钮触发
  document.querySelector('.editor-panel').style.display = 'none';
  document.getElementById('editor').style.display = 'none';
  document.getElementById('dailyQuote').style.display = 'none';
  document.getElementById('moodRow').style.display = 'none';
  document.querySelector('.editor-toolbar').style.display = 'none';
  document.getElementById('mdPreview').style.display = 'none';
  document.querySelector('.editor-actions').style.display = 'none';
  activeTemplateLabel = null;
  document.getElementById('etLabel').textContent = '自由记录';
  document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));

  // 恢复心情
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('mood-active'));
  if (entry.mood) {
    const moodBtn = document.querySelector(`.mood-btn[data-mood="${entry.mood}"]`);
    if (moodBtn) moodBtn.classList.add('mood-active');
  }

  const ts = document.getElementById('dateTimerSummary');
  if (entry.duration) {
    ts.textContent = `已计时 ${fmtDuration(entry.duration)}`;
  } else { ts.textContent = ''; }

  updateSessionInfo(entry);

  const d = parseDate(dateStr);
  if (d.getFullYear() !== calYear || d.getMonth() !== calMonth) {
    renderCalendar(d.getFullYear(), d.getMonth());
  } else {
    renderCalendar(calYear, calMonth);
  }

  // 日期切换后刷新当前统计图表
  if (currentStatsTab === 'week') drawWeekChart();
  else if (currentStatsTab === 'month') drawMonthChart();
  else if (currentStatsTab === 'mood') drawMoodChart();
  else if (currentStatsTab === 'ledgerTrend') { drawLedgerTrend(); updateTrendCards(); }
}
function goToToday() { setDate(getToday()); }

let calendarVisible = false;
function toggleCalendar() {
  calendarVisible = !calendarVisible;
  const sidebar = document.querySelector('.sidebar');
  const btn = document.getElementById('btnCalendar');
  if (calendarVisible) {
    sidebar.classList.add('show');
    btn.classList.add('active');
    btn.textContent = '收起';
    renderCalendar(calYear, calMonth);
  } else {
    sidebar.classList.remove('show');
    btn.classList.remove('active');
    btn.textContent = '日历';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const content = document.getElementById('tabContent' + (tab === 'ledger' ? 'Ledger' : tab));
  if (content) content.classList.add('active');
}

var _pendingTemplateContents = null;
function selectDropdownTab(tab, label) {
  const editor = document.getElementById('editor');
  const entries = loadEntries();
  const entry = entries[currentDate] || { content: '', duration: 0 };

  // 切换前将当前模板内容暂存到内存中，不写入 localStorage
  // 只有显式点击"保存"按钮才会持久化
  if (activeTemplateLabel && editor) {
    if (!_pendingTemplateContents) _pendingTemplateContents = {};
    _pendingTemplateContents[activeTemplateLabel] = editor.value;
  }

  // 按钮激活态
  document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
  const clickedBtn = document.querySelector(`.plan-btn[onclick*="selectDropdownTab('${tab}'"]`);
  if (clickedBtn) clickedBtn.classList.add('active');

  // 记录当前激活的模板标签
  if (tab === 'ledger') { activeTemplateLabel = null; document.getElementById('etLabel').textContent = '记账'; }
  else { activeTemplateLabel = label; document.getElementById('etLabel').textContent = label; }

  // 内置模板映射
  const templates = {
    '0': '## 今日目标\n\n1. \n2. \n3. \n\n## 完成事项\n\n- \n\n## 明日计划\n\n- ',
    '1': '## 今日工作\n\n- \n\n## 遇到的问题\n\n- \n\n## 解决方案\n\n- \n\n## 明日安排\n\n- ',
    '2': '## 学习内容\n\n- \n\n## 关键知识点\n\n- \n\n## 疑问与思考\n\n- \n\n## 下一步计划\n\n- ',
    '3': '## 早餐\n\n- \n\n## 午餐\n\n- \n\n## 晚餐\n\n- \n\n## 今日饮食小结\n\n- ',
  };
  // 记账：显示 tab-panel 并隐藏编辑器相关
  if (tab === 'ledger') {
    document.querySelector('.editor-panel').style.display = '';
    document.getElementById('tabPanel').style.display = '';
    switchTab('ledger');
    renderLedger();
    if (editor) editor.style.display = 'none';
    document.querySelector('.editor-toolbar').style.display = 'none';
    document.querySelector('.editor-actions').style.display = 'none';
    document.getElementById('mdPreview').style.display = 'none';
    document.getElementById('dailyQuote').style.display = 'none';
    if (previewOn) togglePreview();
    return;
  }
  // 其他模板 tab：隐藏 tab-panel，恢复编辑器相关
  document.querySelector('.editor-panel').style.display = '';
  document.getElementById('tabPanel').style.display = 'none';
  document.querySelector('.editor-toolbar').style.display = '';
  document.querySelector('.editor-actions').style.display = '';
  document.getElementById('dailyQuote').style.display = '';
  document.getElementById('moodRow').style.display = '';
  if (editor) {
    // 优先加载内存中暂存的模板内容（跨标签切换未保存的内容），其次加载已保存的模板内容，否则使用默认模板
    const pending = _pendingTemplateContents && _pendingTemplateContents[label];
    const saved = (entry.templateContents && entry.templateContents[label]) || '';
    editor.value = pending || saved || (templates[tab] || '');
  }
  // 确保编辑器可见，预览仅在开启时显示
  if (previewOn) {
    document.getElementById('mdPreview').innerHTML = renderMarkdown(editor.value);
    document.getElementById('mdPreview').style.display = '';
    editor.style.display = 'none';
  } else {
    document.getElementById('mdPreview').style.display = 'none';
    editor.style.display = '';
  }
  document.querySelector('.editor-actions').style.display = '';
}

function updateSessionInfo(dur) {
  const info = document.getElementById('sessionInfo');
  if (dur > 0) {
    info.textContent = `累计 ${fmtDuration(dur)}`;
  } else { info.textContent = ''; }
}

// ====== 计时器 ======
let countdownTarget = 25 * 60;
let timerSeconds = countdownTarget;
let initialSeconds = countdownTarget;
let isRunning = false;
let timerInterval = null;
let totalElapsed = 0;

// 番茄循环
let autoCycleOn = false;
let focusDuration = 25 * 60;
let breakDuration = 5 * 60;
let currentRound = 0;
let totalRoundsToday = 0;
let currentPhase = 'focus'; // 'focus' | 'break'

// 通知
let notificationGranted = false;

// 音效开关
let soundEnabled = true;
function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundIcon').textContent = soundEnabled ? '🔔' : '🔇';
}
function playBeep(freq, dur, vol) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
requestNotification();

function requestNotification() {
  try {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().then(p => { notificationGranted = p === 'granted'; }).catch(function(){});
    } else if (Notification.permission === 'granted') {
      notificationGranted = true;
    }
  } catch(e) {}
}

function sendNotification(title, body) {
  try {
    if (!notificationGranted || document.visibilityState === 'visible') return;
    new Notification(title, { body });
  } catch(e) {}
}

// ====== 番茄循环 ======
function toggleAutoCycle() {
  autoCycleOn = document.getElementById('autoCycle').checked;
  document.getElementById('cycleSettings').style.display = autoCycleOn ? 'flex' : 'none';
  if (autoCycleOn) {
    focusDuration = parseInt(document.getElementById('focusMins').value) * 60;
    breakDuration = parseInt(document.getElementById('breakMins').value) * 60;
    if (!isRunning) {
      countdownTarget = focusDuration;
      timerSeconds = focusDuration;
      initialSeconds = focusDuration;
      updateTimerDisplay();
    }
    currentRound = 0;
    currentPhase = 'focus';
    updateCycleUI();
  } else {
    document.getElementById('cycleIndicator').style.display = 'none';
  }
}

function updateCycleSettings() {
  focusDuration = parseInt(document.getElementById('focusMins').value) * 60;
  breakDuration = parseInt(document.getElementById('breakMins').value) * 60;
  if (autoCycleOn && currentPhase === 'focus' && !isRunning) {
    countdownTarget = focusDuration;
    timerSeconds = focusDuration;
    initialSeconds = focusDuration;
    updateTimerDisplay();
  }
}

function updateCycleUI() {
  const ind = document.getElementById('cycleIndicator');
  const label = document.getElementById('cycleLabel');
  if (!autoCycleOn) { ind.style.display = 'none'; return; }
  ind.style.display = 'flex';
  if (currentPhase === 'focus') {
    ind.className = 'cycle-indicator focus';
    label.textContent = '专注中';
  } else {
    ind.className = 'cycle-indicator break';
    label.textContent = '休息中';
  }
  document.getElementById('roundCounter').textContent = currentRound > 0 ? `第 ${currentRound} 轮` : '';
}

// ====== 显示 ======
function fmtTimeCompact(t) {
  const m = Math.floor(t / 60), s = t % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerDisplay() {
  document.getElementById('timerDisplay').textContent = fmtTimeCompact(timerSeconds);
  updateProgress();
  // 动态更新浏览器标签页标题
  document.title = isRunning ? '剩余 ' + fmtTimeCompact(timerSeconds) + ' - 每日文档' : '每日文档';
}

function updateProgress() {
  const bar = document.getElementById('progressBar');
  if (initialSeconds > 0) {
    bar.style.width = Math.max(0, (timerSeconds / initialSeconds) * 100) + '%';
    bar.style.background = currentPhase === 'break' ? 'linear-gradient(90deg, #81c784, #4caf50)' : 'linear-gradient(90deg, #f06292, #e91e63)';
  } else {
    bar.style.width = '0%';
  }
}

function setPreset(mins) {
  if (isRunning) return;
  countdownTarget = mins * 60;
  timerSeconds = countdownTarget;
  initialSeconds = countdownTarget;
  totalElapsed = 0;
  document.getElementById('timerDone').style.display = 'none';
  document.getElementById('customMins').value = '';
  updateTimerDisplay();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  const labels = {15:'15分钟',25:'25分钟',30:'30分钟',45:'45分钟',60:'60分钟'};
  document.querySelectorAll('.preset-btn').forEach(b => { if (b.textContent === labels[mins]) b.classList.add('selected'); });
}

function setCustom() {
  const v = parseInt(document.getElementById('customMins').value);
  if (!v || v < 1 || v > 240) return;
  if (isRunning) return;
  countdownTarget = v * 60;
  timerSeconds = countdownTarget;
  initialSeconds = countdownTarget;
  totalElapsed = 0;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  updateTimerDisplay();
}

function startTimer() {
  if (isRunning) return;
  if (timerSeconds <= 0) { showToast('请先设置时间'); return; }
  preCountdown(() => _doStartTimer());
}
function _doStartTimer() {
  if (isRunning) return;
  isRunning = true;
  document.getElementById('timerDone').style.display = 'none';
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = '';
  updateCycleUI();
  timerInterval = setInterval(() => {
    timerSeconds--;
    totalElapsed++;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      finishTimer();
    }
  }, 1000);
}

function pauseTimer() {
  if (!isRunning) return;
  isRunning = false;
  clearInterval(timerInterval);
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  document.title = '每日文档';
}

// ====== 全屏专注模式 ======
let focusMode = false;
function toggleFocusMode() {
  focusMode = !focusMode;
  document.body.classList.toggle('focus-mode', focusMode);
  if (focusMode) {
    document.getElementById('btnFocus').textContent = '退出专注';
    document.getElementById('btnFocus').classList.add('active');
    // 自动收起日历
    if (calendarVisible) toggleCalendar();
  } else {
    document.getElementById('btnFocus').textContent = '全屏专注';
    document.getElementById('btnFocus').classList.remove('active');
  }
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && focusMode) toggleFocusMode();
  // Enter: 快捷记账
  if (e.key === 'Enter' && (document.activeElement === document.getElementById('lNote') || document.activeElement === document.getElementById('lAmount'))) {
    e.preventDefault();
    addLedgerEntry();
  }
  // Ctrl+S / Cmd+S: save
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveEntry();
    showToast('已保存');
  }
  // Ctrl+B / Cmd+B: bold (only when editor focused)
  if ((e.ctrlKey || e.metaKey) && e.key === 'b' && document.activeElement === document.getElementById('editor')) {
    e.preventDefault();
    const ed = document.getElementById('editor');
    const start = ed.selectionStart, end = ed.selectionEnd;
    const text = ed.value;
    const before = text.substring(0, start);
    const sel = text.substring(start, end);
    const after = text.substring(end);
    if (sel) {
      ed.value = before + '**' + sel + '**' + after;
      ed.selectionStart = start + 2;
      ed.selectionEnd = end + 2;
    } else {
      ed.value = before + '****' + after;
      ed.selectionStart = start + 2;
      ed.selectionEnd = start + 2;
    }
    ed.focus();
  }
  // Ctrl+F / Cmd+F: focus editor
  if ((e.ctrlKey || e.metaKey) && e.key === 'f' && document.activeElement !== document.getElementById('editor')) {
    e.preventDefault();
    document.getElementById('editor').focus();
  }
});

// ====== 预备倒计时 ======
function preCountdown(callback) {
  const overlay = document.getElementById('cdOverlay');
  const numEl = document.getElementById('cdNumber');
  overlay.classList.add('show');
  let count = 3;
  numEl.textContent = count;
  numEl.style.animation = 'none';
  void numEl.offsetWidth;
  numEl.style.animation = 'cdPulse 0.5s ease-out';
  playBeep(440, 0.15, 0.2);

  const cdInterval = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(cdInterval);
      numEl.textContent = 'GO!';
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'cdPulse 0.5s ease-out';
      playBeep(880, 0.3, 0.3);
      setTimeout(() => {
        overlay.classList.remove('show');
        callback();
      }, 600);
    } else {
      numEl.textContent = count;
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'cdPulse 0.5s ease-out';
      playBeep(440, 0.15, 0.2);
    }
  }, 800);
}

function playChime() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function finishTimer() {
  playBeep(523, 0.15, 0.3);
  setTimeout(() => playBeep(659, 0.15, 0.3), 200);
  setTimeout(() => playBeep(784, 0.3, 0.3), 400);
  pauseTimer();
  document.getElementById('progressBar').style.width = '0%';

  if (autoCycleOn) {
    autoRecord();
    if (currentPhase === 'focus') {
      // 专注结束 → 进入休息
      currentRound++;
      totalRoundsToday++;
      currentPhase = 'break';
      timerSeconds = breakDuration;
      initialSeconds = breakDuration;
      document.getElementById('timerDisplay').textContent = fmtTimeCompact(timerSeconds);
      document.getElementById('timerDone').style.display = '';
      document.getElementById('timerDone').textContent = '休息一下！';
      document.getElementById('btnStart').textContent = '开始休息';
      updateCycleUI();
      sendNotification('专注完成！', `第 ${currentRound} 轮专注结束，该休息 ${Math.floor(breakDuration/60)} 分钟了`);
      showToast('休息时间到了！');
      // 自动开始休息
      setTimeout(() => { if (!isRunning && autoCycleOn) startTimer(); }, 1500);
    } else {
      // 休息结束 → 进入专注
      currentPhase = 'focus';
      timerSeconds = focusDuration;
      initialSeconds = focusDuration;
      document.getElementById('timerDisplay').textContent = fmtTimeCompact(timerSeconds);
      document.getElementById('timerDone').style.display = '';
      document.getElementById('timerDone').textContent = '开始专注！';
      document.getElementById('btnStart').textContent = '开始专注';
      updateCycleUI();
      sendNotification('休息结束！', '继续下一轮专注吧');
      showToast('开始下一轮专注！');
      setTimeout(() => { if (!isRunning && autoCycleOn) startTimer(); }, 1500);
    }
  } else {
    document.getElementById('timerDisplay').textContent = '00:00';
    document.getElementById('timerDone').style.display = '';
    document.getElementById('timerDone').textContent = '专注完成！';
    playChime();
    showToast('专注时间完成！');
    sendNotification('专注完成！', '计时已结束');
    autoRecord();
  }
}

function autoRecord() {
  if (totalElapsed <= 0) return;
  const entries = loadEntries();
  const entry = entries[currentDate] || { content: '', duration: 0, tags: [], rounds: 0, tagDurations: {} };
  entry.duration = (entry.duration || 0) + totalElapsed;
  entry.rounds = (entry.rounds || 0) + (currentPhase === 'focus' ? 0 : 1);
  // 记录时间段
  entry.timeBlocks = entry.timeBlocks || [];
  entry.timeBlocks.push({ hour: new Date().getHours(), mins: Math.round(totalElapsed / 60) });
  entries[currentDate] = entry;
  saveEntries(entries);
  updateSessionInfo(entry);
  document.getElementById('dateTimerSummary').textContent = `已计时 ${fmtDuration(entry.duration)}` + (entry.rounds ? `  ${entry.rounds}轮` : '');
  const d = parseDate(currentDate);
  renderCalendar(d.getFullYear(), d.getMonth());
  // 计时完成后刷新当前统计图表
  if (currentStatsTab === 'week') drawWeekChart();
  else if (currentStatsTab === 'month') drawMonthChart();
  else if (currentStatsTab === 'mood') drawMoodChart();
  else if (currentStatsTab === 'ledgerTrend') { drawLedgerTrend(); updateTrendCards(); }
  backupDayData();
  totalElapsed = 0;
}

function resetTimer() {
  pauseTimer();
  currentPhase = 'focus';
  document.getElementById('btnStart').textContent = '开始专注';
  timerSeconds = autoCycleOn ? focusDuration : initialSeconds;
  totalElapsed = 0;
  document.getElementById('timerDone').style.display = 'none';
  updateTimerDisplay();
  updateCycleUI();
}

function recordTime() {
  if (totalElapsed === 0) { showToast('请先开始计时'); return; }
  pauseTimer();
  const entries = loadEntries();
  const entry = entries[currentDate] || { content: '', duration: 0, tags: [], rounds: 0, tagDurations: {} };
  entry.duration = (entry.duration || 0) + totalElapsed;
  entry.timeBlocks = entry.timeBlocks || [];
  entry.timeBlocks.push({ hour: new Date().getHours(), mins: Math.round(totalElapsed / 60) });
  entries[currentDate] = entry;
  saveEntries(entries);
  updateSessionInfo(entry);
  document.getElementById('dateTimerSummary').textContent = `已计时 ${fmtDuration(entry.duration)}` + (entry.rounds ? `  ${entry.rounds}轮` : '');
  const d = parseDate(currentDate);
  renderCalendar(d.getFullYear(), d.getMonth());
  // 手动记录计时后刷新当前统计图表
  if (currentStatsTab === 'week') drawWeekChart();
  else if (currentStatsTab === 'month') drawMonthChart();
  else if (currentStatsTab === 'mood') drawMoodChart();
  else if (currentStatsTab === 'ledgerTrend') { drawLedgerTrend(); updateTrendCards(); }
  showToast(`已记录 ${fmtTimeCompact(totalElapsed)}`);
  backupDayData();
  totalElapsed = 0;
  timerSeconds = initialSeconds;
  document.getElementById('timerDone').style.display = 'none';
  updateTimerDisplay();

function updateSessionInfo(entry) {
  const info = document.getElementById('sessionInfo');
  const parts = [];
  if (entry && entry.duration) {
    parts.push(`累计 ${fmtDuration(entry.duration)}`);
  }
  if (entry && entry.rounds) parts.push(`${entry.rounds}轮`);
  if (entry && entry.tags && entry.tags.length) parts.push(`标签: ${entry.tags.join(', ')}`);
  info.textContent = parts.join(' | ');
}

// ====== 本地备份（localStorage 自动写入 + JSON 文件 + Git 管理） ======

// 备份目录句柄缓存（通过 File System Access API 获取并持久化到 IndexedDB）
var _backupDirHandleCache = null;

// 仅从缓存（内存 + IndexedDB）恢复句柄，不弹窗。无有效句柄时返回 null。
async function _getCachedDirHandle() {
  if (_backupDirHandleCache) {
    try {
      var opts = { mode: 'readwrite' };
      if (await _backupDirHandleCache.queryPermission(opts) === 'granted') return _backupDirHandleCache;
    } catch(e) {}
  }
  // 从 IndexedDB 恢复句柄
  try {
    var db = await new Promise(function(resolve, reject) {
      var req = indexedDB.open('daily_doc_backup_dir', 1);
      req.onupgradeneeded = function() { req.result.createObjectStore('handles'); };
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
    var storedHandle = await new Promise(function(resolve) {
      var tx = db.transaction('handles', 'readonly');
      var req = tx.objectStore('handles').get('backup_dir_handle');
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { resolve(null); };
    });
    if (storedHandle) {
      var opts2 = { mode: 'readwrite' };
      if (await storedHandle.queryPermission(opts2) === 'granted') {
        _backupDirHandleCache = storedHandle;
        localStorage.setItem('backup_dir_handle', '1');
        return storedHandle;
      }
    }
  } catch(e) {}
  return null;
}

// 用户主动触发时调用：弹出目录选择器 + 写入 IndexedDB。
async function _requestBackupDir() {
  // 先尝试缓存
  var cached = await _getCachedDirHandle();
  if (cached) return cached;
  // 无缓存则弹窗选择
  if (!window.showDirectoryPicker) {
    console.warn('File System Access API not available');
    return null;
  }
  try {
    var handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    _backupDirHandleCache = handle;
    localStorage.setItem('backup_dir_handle', '1');
    // 持久化到 IndexedDB
    var db = await new Promise(function(resolve, reject) {
      var req = indexedDB.open('daily_doc_backup_dir', 1);
      req.onupgradeneeded = function() { req.result.createObjectStore('handles'); };
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
    var tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'backup_dir_handle');
    return handle;
  } catch(e) {
    console.warn('Directory selection cancelled:', e);
    return null;
  }
}

// 设置 git 操作标志位，供外部脚本读取并执行 git add + commit + push
function _triggerGitAction() {
  try { localStorage.setItem('git_action', 'commit_and_push'); } catch(e) {}
}

function _backupMonthKey() {
  var parts = currentDate.split('-');
  return parts[0] + '-' + parts[1];
}

function _backupStorageKey() {
  return 'backup_' + _backupMonthKey();
}

function _loadBackup() {
  try { return JSON.parse(localStorage.getItem(_backupStorageKey()) || '{"entries":{},"ledger":[]}'); }
  catch(e) { return { entries: {}, ledger: [] }; }
}

async function _saveBackup(backup) {
  // 兜底：localStorage 始终保留
  try { localStorage.setItem(_backupStorageKey(), JSON.stringify(backup)); } catch(e) {}
  // 仅当句柄已缓存时静默写入文件，不弹窗
  try {
    var dirHandle = await _getCachedDirHandle();
    if (dirHandle) {
      var fname = 'backup-' + _backupMonthKey() + '.json';
      var fileHandle = await dirHandle.getFileHandle(fname, { create: true });
      var writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(backup, null, 2));
      await writable.close();
    }
  } catch(e) { console.warn('JSON file backup failed:', e); }
}

async function backupDayData() {
  try {
    var backup = _loadBackup();

    // 当日日记（覆盖）
    var entries = loadEntries();
    if (entries[currentDate]) backup.entries[currentDate] = entries[currentDate];

    // 当日账本（替换式）
    var allLedger = getLedgerData();
    var todayLedger = allLedger.filter(function(t) { return t.date === currentDate; });
    backup.ledger = backup.ledger.filter(function(t) { return t.date !== currentDate; });
    backup.ledger = backup.ledger.concat(todayLedger);
    backup._updatedAt = new Date().toISOString();

    await _saveBackup(backup);
    // 触发 git commit + push
    _triggerGitAction();
  } catch(e) {}
}

// ====== Markdown 简易渲染 ======
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 粗体/斜体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 引用
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // 无序列表
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // 有序列表
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // 段落：连续非空行
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // 清理空标签和多余嵌套
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>(<(h[123]|ul|blockquote|pre)>)/g, '$1');
  html = html.replace(/(<\/(h[123]|ul|blockquote|pre)>)(<\/p>)?/g, '$1');
  // 单个换行 → <br>
  html = html.replace(/\n/g, '<br>');
  return html;
}

let previewOn = false;
function togglePreview() {
  previewOn = !previewOn;
  const ed = document.getElementById('editor');
  const pv = document.getElementById('mdPreview');
  const btn = document.getElementById('btnPreview');
  if (previewOn) {
    pv.innerHTML = renderMarkdown(ed.value);
    pv.style.display = ''; ed.style.display = 'none';
    btn.classList.add('active'); btn.textContent = '编辑';
  } else {
    pv.style.display = 'none'; ed.style.display = '';
    btn.classList.remove('active'); btn.textContent = '预览';
  }
}

function getWeekDays() {
  const days = [];
  const refDate = parseDate(currentDate);
  const dow = refDate.getDay();
  const monday = new Date(refDate); monday.setDate(refDate.getDate() - (dow === 0 ? 6 : dow - 1));
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push(fmtDate(d));
  }
  return days;
}

function getMonthDays() {
  const days = [];
  const refDate = parseDate(currentDate);
  const y = refDate.getFullYear(), m = refDate.getMonth();
  const dim = new Date(y, m+1, 0).getDate();
  for (let d = 1; d <= dim; d++) days.push(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  return days;
}

function drawBarChart(data, labels, title) {
  if (!statsCtx) return;
  // roundRect polyfill
  if (!statsCtx.roundRect) {
    statsCtx.roundRect = function(x,y,w,h,r) {
      if (typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
      else if (Array.isArray(r)) r = {tl:r[0]||0,tr:r[1]||0,br:r[2]||0,bl:r[3]||0};
      this.beginPath();
      this.moveTo(x+(r.tl||0), y);
      this.lineTo(x+w-r.tr, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r.tr);
      this.lineTo(x+w, y+h-r.br);
      this.quadraticCurveTo(x+w, y+h, x+w-r.br, y+h);
      this.lineTo(x+r.bl, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r.bl);
      this.lineTo(x, y+r.tl);
      this.quadraticCurveTo(x, y, x+r.tl, y);
      this.closePath();
    };
  }
  const W = statsCanvas.width, H = statsCanvas.height;
  const pad = { top: 40, right: 20, bottom: 50, left: 50 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  statsCtx.clearRect(0, 0, W, H);

  // 标题
  statsCtx.fillStyle = '#880e4f'; statsCtx.font = 'bold 14px -apple-system, sans-serif';
  statsCtx.textAlign = 'center'; statsCtx.fillText(title, W/2, 20);

  const maxVal = (() => { const v = Math.max(1, ...data); return isNaN(v) ? 1 : v; })();
  const barW = Math.min(40, (chartW / data.length) * 0.7);
  const gap = chartW / data.length;

  // Y轴
  statsCtx.strokeStyle = '#fce4ec'; statsCtx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + chartH * (1 - i / 4);
    statsCtx.beginPath(); statsCtx.moveTo(pad.left, y); statsCtx.lineTo(W - pad.right, y); statsCtx.stroke();
    statsCtx.fillStyle = '#f48fb1'; statsCtx.font = '11px -apple-system, sans-serif';
    statsCtx.textAlign = 'right';
    statsCtx.fillText(Math.round(maxVal * i / 4), pad.left - 8, y + 4);
  }

  // 柱状图
  data.forEach((v, i) => {
    const x = pad.left + gap * i + (gap - barW) / 2;
    const barH = (v / maxVal) * chartH;
    const y = pad.top + chartH - barH;

    const grad = statsCtx.createLinearGradient(x, y, x, pad.top + chartH);
    grad.addColorStop(0, '#f06292'); grad.addColorStop(1, '#fce4ec');
    statsCtx.fillStyle = grad;
    statsCtx.beginPath();
    statsCtx.roundRect(x, y, barW, barH, [4, 4, 0, 0]);
    statsCtx.fill();

    // 数值
    if (v > 0) {
      statsCtx.fillStyle = '#880e4f'; statsCtx.font = 'bold 11px -apple-system, sans-serif';
      statsCtx.textAlign = 'center';
      statsCtx.fillText(v, x + barW/2, y - 4);
    }

    // X轴标签（仅≤7个全量渲染；超过7个时仅渲染1号/5的倍数/最后一天）
    const dayNum = parseInt(labels[i]) || 0;
    const isLast = i === labels.length - 1;
    const showLabel = data.length <= 7 || dayNum === 1 || (dayNum % 5 === 0) || isLast;
    if (showLabel) {
      statsCtx.fillStyle = '#6d4c5e'; statsCtx.font = '11px -apple-system, sans-serif';
      statsCtx.textAlign = 'center';
      statsCtx.fillText(labels[i], x + barW/2, pad.top + chartH + 16);
    }
  });
}

function drawHeatmap() {
  const entries = loadEntries();
  // 收集最近7天每小时的分钟数
  const days = getWeekDays();
  const wdLabels = ['一','二','三','四','五','六','日'];
  const data = Array.from({length: 7}, () => Array(24).fill(0));

  days.forEach((day, di) => {
    const entry = entries[day];
    if (!entry || !entry.timeBlocks) return;
    entry.timeBlocks.forEach(tb => {
      data[di][tb.hour] += tb.mins || 0;
    });
  });

  const maxVal = Math.max(1, ...data.flat());
  const grid = document.getElementById('heatmapGrid');
  grid.innerHTML = '';

  // 列头
  const headerRow = document.createElement('div');
  headerRow.style.gridColumn = '1 / -1';
  headerRow.style.display = 'contents';
  const emptyHeader = document.createElement('div'); emptyHeader.className = 'hm-label';
  headerRow.appendChild(emptyHeader);
  for (let h = 0; h < 24; h++) {
    const hd = document.createElement('div');
    hd.style.cssText = 'text-align:center;font-size:10px;color:#f48fb1;font-weight:600;';
    hd.textContent = h;
    headerRow.appendChild(hd);
  }
  grid.appendChild(headerRow);

  days.forEach((day, di) => {
    const dateObj = parseDate(day);
    const dayOfWeek = dateObj.getDay();
    const labelIndex = dayOfWeek === 0 ? 6 : dayOfWeek - 1;

    const label = document.createElement('div');
    label.className = 'hm-label';
    label.textContent = wdLabels[labelIndex];
    grid.appendChild(label);

    for (let h = 0; h < 24; h++) {
      const cell = document.createElement('div');
      cell.className = 'hm-cell';
      const v = data[di][h];
      if (v === 0) {
        cell.style.background = '#fafafa';
      } else {
        const intensity = v / maxVal;
        let bg;
        if (intensity < 0.2) bg = '#fce4ec';
        else if (intensity < 0.4) bg = '#f8bbd0';
        else if (intensity < 0.6) bg = '#f06292';
        else if (intensity < 0.8) bg = '#e91e63';
        else bg = '#880e4f';
        cell.style.background = bg;
        cell.title = `${day} ${h}:00 - ${v}分钟`;
      }
      grid.appendChild(cell);
    }
  });
}

// ====== 合并备份数据（日记 + 账本） ======
function mergeBackupData(backup) {
  var importedDiary = 0, importedLedger = 0;
  if (backup.entries) {
    var entries = loadEntries();
    var changed = false;
    Object.keys(backup.entries).forEach(function(k) {
      if (!entries[k] || JSON.stringify(entries[k]) !== JSON.stringify(backup.entries[k])) {
        entries[k] = backup.entries[k];
        importedDiary++;
        changed = true;
      }
    });
    if (changed) saveEntries(entries);
  }
  if (backup.ledger && Array.isArray(backup.ledger)) {
    var localLedger = getLedgerData();
    var idMap = {};
    localLedger.forEach(function(t) { idMap[t.id] = true; });
    var newTxns = backup.ledger.filter(function(t) { return !idMap[t.id]; });
    if (newTxns.length) {
      saveLedgerData(localLedger.concat(newTxns));
      importedLedger = newTxns.length;
    }
  }
  if (typeof setDate === 'function') setDate(currentDate);
  if (typeof calYear !== 'undefined') renderCalendar(calYear, calMonth);
  if (typeof renderLedger === 'function') renderLedger();
  return { diary: importedDiary, ledger: importedLedger };
}

// ====== GitHub 同步 ======
function _isLocalhost() {
  return location.hostname === 'localhost' || location.hostname === '127.0.0.1';
}

function gitSyncToGitHub() {
  var btn = document.getElementById('gitSyncBtn');
  if (!btn) return;
  if (!_isLocalhost()) { showToast('请在本地服务器使用同步功能'); return; }

  var key = _backupStorageKey();
  var raw;
  try { raw = localStorage.getItem(key); } catch(e) { raw = null; }
  if (!raw) { showToast('暂无当月备份数据'); return; }

  // 进入同步中状态
  btn.classList.add('syncing');
  btn.classList.remove('synced', 'sync-error');
  btn.textContent = '同步中...';
  btn.disabled = true;

  var monthKey = _backupMonthKey();
  var filename = 'backup-' + monthKey + '.json';

  fetch(location.origin + '/api/git-sync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename: filename, content: raw })
  })
  .then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  })
  .then(function() {
    btn.classList.remove('syncing');
    btn.classList.add('synced');
    btn.textContent = '已同步 \u2713';
    setTimeout(function() {
      btn.classList.remove('synced');
      btn.textContent = '本月备份同步';
      btn.disabled = false;
      _checkGitSyncBtn();
    }, 2000);
  })
  .catch(function() {
    btn.classList.remove('syncing');
    btn.classList.add('sync-error');
    btn.textContent = '同步失败';
    setTimeout(function() {
      btn.classList.remove('sync-error');
      btn.textContent = '本月备份同步';
      btn.disabled = false;
      _checkGitSyncBtn();
    }, 2000);
  });
}

function _checkGitSyncBtn() {
  var btn = document.getElementById('gitSyncBtn');
  if (!btn) return;

  // 非本地环境：禁用
  if (!_isLocalhost()) {
    btn.disabled = true;
    btn.title = '请在本地服务器使用同步功能（bash serve.sh）';
    return;
  }

  var key = _backupStorageKey();
  var hasData = false;
  try { hasData = !!localStorage.getItem(key); } catch(e) {}
  if (!hasData) {
    btn.disabled = true;
    btn.title = '暂无当月备份数据';
  } else {
    btn.disabled = false;
    btn.title = '';
  }
}
